name: Generate Retro NBA Lineup Graphics (Manual)

on:
  workflow_dispatch: # Allows you to click 'Run workflow' manually

permissions:
  contents: write # Grant write access so script can create JPGs and folders
  actions: read

jobs:
  generate-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # <-- Upgraded to v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5 # <-- Upgraded to v5
        with:
          python-version: 3.9

      - name: Install Pillow
        run: |
          pip install Pillow

      - name: Run Retro Graphic Generator
        run: |
          python scripts/generate_retro_nba_images.py

      - name: Upload Generated Images as Artifacts
        if: success()
        uses: actions/upload-artifact@v4 # <-- THE FIX: Upgraded to v4
        with:
          name: retro-lineup-graphics
          path: retro_social_images/ 
          retention-days: 7
