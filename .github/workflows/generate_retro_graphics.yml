name: Generate Retro NBA Lineup Graphics (Manual)

on:
  workflow_dispatch: 

permissions:
  contents: write 
  actions: read

jobs:
  generate-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 

      - name: Set up Python 3.9
        uses: actions/setup-python@v5 
        with:
          python-version: 3.9

      - name: Install Pillow
        run: |
          pip install Pillow

      - name: Run Retro Graphic Generator
        run: |
          python scripts/generate_retro_nba_images.py

      - name: Commit and Push Images
        run: |
          # 1. Tell git who is making the commit (the GitHub Actions bot)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Stage the newly created folder
          git add retro_social_images/
          
          # 3. Check if there are actually changes to commit, then commit and push
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generated retro NBA graphics" && git push)

      - name: Upload Generated Images as Artifacts
        if: success()
        uses: actions/upload-artifact@v4 
        with:
          name: retro-lineup-graphics
          path: retro_social_images/ 
          retention-days: 7
