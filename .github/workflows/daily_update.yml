name: Update NBA Lineups

on:
  schedule:
    - cron: '*/5 * * * *'  # Keep this as a backup
  workflow_dispatch:        # Keep this for manual button clicks
  repository_dispatch:      # THIS IS NEW
    types: [trigger-update]

permissions:
  contents: write           # IMPORTANT: Allows the script to save changes

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install libraries
        run: |
          pip install pandas requests beautifulsoup4 lxml

      - name: Run Update Script
        run: python auto_update_lineups.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add nba_data.json
          
          # Check if there are staged changes ready to be committed
          if ! git diff --quiet --staged; then
            git commit -m "🏀 Auto-updated NBA lineups [skip ci]"
            
            # Pull latest changes and rebase BEFORE pushing
            git pull --rebase origin main || echo "Nothing to pull"
            
            # Try pushing. If rejected, pull again and immediately push.
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "No new lineup updates. Skipping commit."
          fi
