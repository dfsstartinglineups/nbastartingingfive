name: Update NBA Data

on:
  workflow_dispatch:        # For manual button clicks
  repository_dispatch:      # For your outside pinger
    types: [trigger-update]

permissions:
  contents: write           # IMPORTANT: Allows the script to save changes

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install libraries
        run: |
          pip install pandas requests beautifulsoup4 lxml selenium webdriver-manager

      - name: Run Update Script
        # Pointing to the new folder and file name
        run: python scripts/scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage the legacy JSON and the new data directory
          git add nba_data.json
          git add data/
          
          # Check if there are staged changes ready to be committed
          if ! git diff --quiet --staged; then
            git commit -m "🏀 Auto-updated NBA data [skip ci]"
            
            # 🛑 THE FIX: Pull latest changes, rebase, and aggressively force our new scrape to win any conflicts
            git pull origin main --rebase --strategy-option=theirs
            
            # Push cleanly to the repository
            git push origin main
          else
            echo "No new updates. Skipping commit."
          fi
