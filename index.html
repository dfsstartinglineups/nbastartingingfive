        body { background-color: #f1f3f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* Sleek Header - Upgraded for NBA */
        .header-brand { 
            font-weight: 900;

            font-style: italic;

            background: linear-gradient(to bottom, #ff6b6b 0%, #dc3545 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(220, 53, 69, 0.8));
            padding-right: 2px; /* Fix for italic 'e' getting cut off */
            display: inline-block; /* Required for padding to push the bounding box */
        }
        
        /* Lineup Card */
        .lineup-card { 
            background: #fff;

            border-radius: 12px;

        /* Logos */

            width: 65px;
            height: 65px;
            object-fit: contain;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.1));

        /* Starting Five List */
        .batting-order { padding-left: 0; list-style-type: none; margin-bottom: 0; }
        .batting-order li {

            font-size: 0.85rem;
            border-bottom: 1px solid #f1f3f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .batting-order li:last-child { border-bottom: none; }
        .batter-name { font-weight: 600; color: #495057; }
        
        /* --- X (Twitter) Share Button Styles --- */
        .x-btn {
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        .x-btn:hover { background-color: #333; color: #fff; }
        .x-icon { fill: currentColor; width: 14px; height: 14px; }

        .visually-hidden-seo { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
        
        /* EXPANDING SEARCH BOX (NBA THEME) */
        #team-search { 
            color: #ffffff !important; 
            color-scheme: dark; 
            width: 45px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #343a40;
            border: 1px solid #495057;
            cursor: pointer;
        }
        #team-search:focus { 
            width: 150px;
            background-color: #495057 !important; 
            border-color: #dc3545 !important; /* NBA Red */
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25) !important;
            cursor: text;
        }
    </style>

    <script>
        window.updateSEO = function(dateStr) {
            let dateObj = dateStr ? new Date(dateStr + 'T00:00:00') : new Date();
            const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            
            let titleText = `NBA Starting Lineups & Odds for ${formattedDate} | NBAStartingFive`;
            let descText = `Live NBA starting lineups, point spreads, over/unders, and matchup stats for ${formattedDate}. Built for DFS and sports bettors.`;
            
            document.title = titleText;
            document.querySelector('meta[name="description"]')?.setAttribute('content', descText);
            document.querySelector('meta[property="og:title"]')?.setAttribute('content', titleText);
            document.querySelector('meta[property="og:description"]')?.setAttribute('content', descText);
        };

        document.addEventListener('DOMContentLoaded', () => window.updateSEO());
    </script>
