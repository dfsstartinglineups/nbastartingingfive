<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Starting 5 - Tactical Square</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&family=Oswald:wght@500;700&family=Montserrat:ital,wght@0,800;1,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Default Fallback Colors */
            --team-primary: #17408B; 
            --team-secondary: #C9082A;
            --bg-dark: #0a0b0d;
            --text-light: #f8f9fa;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #000;
            font-family: 'Oswald', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- UI Controls --- */
        #controls {
            margin-bottom: 20px;
            background: #222;
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            z-index: 100;
        }

        select, button {
            padding: 8px 16px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #333;
            color: white;
            cursor: pointer;
            font-family: 'Oswald', sans-serif;
        }

        button:hover { background: #555; }

        /* =========================================
           THE EXPORTABLE CANVAS (1080x1080 SQUARE)
           ========================================= */
        #capture-area {
            width: 1080px;
            height: 1080px; 
            background-color: var(--bg-dark);
            /* Subtle Dark Hardwood Floor CSS Pattern */
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 100px, transparent 100px);
            background-size: 40px 100px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            color: var(--text-light);
            border-top: 15px solid var(--team-primary);
            border-bottom: 15px solid var(--team-primary);
        }

        /* Top Glowing Light Effect */
        .arena-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 350px;
            background: radial-gradient(ellipse at top, var(--team-primary) 0%, transparent 70%);
            opacity: 0.3;
            z-index: 1;
            pointer-events: none;
        }

        /* --- Header Section --- */
        #header {
            width: 100%;
            box-sizing: border-box;
            padding: 30px 50px 10px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }

        .header-left { display: flex; flex-direction: column; }

        .starting-tag {
            font-family: 'Teko', sans-serif;
            font-size: 40px; 
            color: var(--team-primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        #team-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 75px; 
            margin: 0;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 4px 4px 0px var(--team-primary);
        }

        #matchup-info {
            font-family: 'Oswald', sans-serif;
            font-size: 24px;
            color: #ccc;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #team-logo {
            width: 140px; 
            height: 140px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* --- Tactical Half-Court --- */
        #court-scene {
            width: 100%;
            height: 850px; 
            position: absolute;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        #court {
            width: 960px; 
            height: 800px; 
            position: relative;
            border: 4px solid var(--team-primary);
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* Court Painted Lines */
        .paint-area {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 350px; 
            border: 4px solid var(--team-primary);
            border-bottom: none;
            background: linear-gradient(to top, rgba(255,255,255,0.05), transparent);
        }

        .free-throw-circle {
            position: absolute;
            bottom: 350px; 
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 60px; 
            border: 4px solid var(--team-primary);
            border-bottom: none; 
            border-radius: 60px 60px 0 0; 
            background: transparent; 
            z-index: 1;
        }

        .three-point-arc {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 550px; 
            border: 4px solid var(--team-primary);
            border-radius: 50% 50% 0 0;
            border-bottom: none;
            clip-path: inset(0 0 80px 0); 
            box-sizing: border-box; 
        }

        .corner-three-left { position: absolute; bottom: 0; left: 80px; width: 4px; height: 81px; background: var(--team-primary); }
        .corner-three-right { position: absolute; bottom: 0; right: 80px; width: 4px; height: 81px; background: var(--team-primary); }

        .half-court-circle {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; 
            height: 250px; 
            border: 4px solid var(--team-primary);
            border-radius: 50%;
        }

        /* The Massive Ghost Watermark */
        .watermark-logo {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px; 
            height: 500px; 
            object-fit: contain;
            opacity: 0.15; 
            z-index: 0;
            pointer-events: none;
            filter: grayscale(100%) brightness(150%);
        }

        /* --- Player Nodes --- */
        .player-node {
            position: absolute;
            width: 170px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* The Left Satellite: Position */
        .player-position {
            position: absolute;
            top: 15px; 
            left: 5px; 
            background-color: var(--team-primary);
            color: white;
            border: 3px solid var(--team-secondary);
            width: 44px; 
            height: 44px; 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Teko', sans-serif;
            font-size: 22px; 
            font-weight: bold;
            z-index: 15;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
        }

        /* The Right Satellite: Jersey Number */
        .player-number {
            position: absolute;
            top: 15px; 
            right: 5px; 
            background-color: #111;
            color: white;
            border: 3px solid var(--team-secondary);
            width: 44px; 
            height: 44px; 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Teko', sans-serif;
            font-size: 26px; 
            font-weight: bold;
            z-index: 15;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
        }

        .player-photo-container {
            width: 125px;  
            height: 125px; 
            border-radius: 50%;
            border: 5px solid var(--team-secondary); 
            background-color: #222;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 12;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
        }

        .player-photo { 
            width: 130%; 
            height: 130%; 
            object-fit: cover; 
            object-position: top center; 
        }
        
        .fallback-silhouette {
            width: 70%;
            height: 90%;
            background: #444;
            clip-path: polygon(20% 100%, 20% 60%, 40% 40%, 40% 20%, 60% 20%, 60% 40%, 80% 60%, 80% 100%);
            opacity: 0.6;
        }

        .player-nameplate {
            margin-top: -16px; 
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 18px; 
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
            font-size: 19px; 
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 14;
