<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Tactical Matchup Generator (Vertical 4:5)</title>
    <style>
        :root {
            --bg-color: #0b0e14;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Controls outside the capture area */
        #controls {
            margin-bottom: 20px;
            background: #2a2a2a;
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }

        select, button {
            padding: 8px 16px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #333;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover { background: #444; }

        /* =========================================
           THE EXPORTABLE CANVAS (1080x1350)
           Optimized for mobile-friendly vertical viewing
           ========================================= */
        #capture-area {
            width: 1080px;
            height: 1350px; 
            background: radial-gradient(circle at center, #1a2235 0%, #080a0f 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* --- Header --- */
        #header {
            width: 100%;
            padding: 10px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }

        .team-block {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 42%;
        }
        .team-block.home { justify-content: flex-end; }
        .team-block.away { justify-content: flex-start; }

        .team-logo { width: 50px; height: 50px; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        
        .team-info-text { display: flex; flex-direction: column; }
        .team-block.home .team-info-text { align-items: flex-end; }
        .team-block.away .team-info-text { align-items: flex-start; }

        .team-name { font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin: 0; line-height: 1; }
        .formation { font-size: 14px; font-weight: bold; color: #adb5bd; margin-top: 2px; }

        .vs-badge {
            width: 10%;
            text-align: center;
            font-size: 18px;
            font-weight: 900;
            color: #fff;
            background: rgba(255,255,255,0.1);
            padding: 4px 0;
            border-radius: 20px;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- 2D Flat Pitch --- */
        #scene {
            width: 100%;
            height: 1250px; 
            position: absolute;
            bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #pitch {
            width: 980px; 
            height: 1230px; 
            background: repeating-linear-gradient(
                0deg,
                #1e4d2b,
                #1e4d2b 75px,
                #1a4224 75px,
                #1a4224 150px
            );
            position: relative;
            border: 4px solid rgba(255,255,255,0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 4px;
        }

        /* Field Lines */
        .pitch-line { position: absolute; border: 3px solid rgba(255,255,255,0.5); z-index: 2; }
        .center-circle { width: 220px; height: 220px; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .center-dot { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; }
        .halfway-line { width: 100%; height: 3px; top: 50%; border-left: none; border-right: none; background: rgba(255,255,255,0.5); border: none; z-index: 2; }
        
        .penalty-box-bottom { width: 440px; height: 160px; bottom: 0; left: 50%; transform: translateX(-50%); border-bottom: none; }
        .six-yard-bottom { width: 220px; height: 60px; bottom: 0; left: 50%; transform: translateX(-50%); border-bottom: none; position: absolute; border: 3px solid rgba(255,255,255,0.5); z-index: 2;}
        .penalty-arc-bottom { width: 160px; height: 90px; bottom: 160px; left: 50%; transform: translateX(-50%); border: 3px solid rgba(255,255,255,0.5); border-bottom: none; border-radius: 90px 90px 0 0; position: absolute; border-bottom-color: transparent; z-index: 2;}
        
        .penalty-box-top { width: 440px; height: 160px; top: 0; left: 50%; transform: translateX(-50%); border-top: none; }
        .six-yard-top { width: 220px; height: 60px; top: 0; left: 50%; transform: translateX(-50%); border-top: none; position: absolute; border: 3px solid rgba(255,255,255,0.5); z-index: 2;}
        .penalty-arc-top { width: 160px; height: 90px; top: 160px; left: 50%; transform: translateX(-50%); border: 3px solid rgba(255,255,255,0.5); border-top: none; border-radius: 0 0 90px 90px; position: absolute; border-top-color: transparent; z-index: 2;}

        /* --- New Central Watermarks --- */
        .watermark {
            position: absolute;
            width: 600px; 
            height: 600px; 
            object-fit: contain;
            opacity: 0.5; /* 50% opacity */
            transform: translate(-50%, -50%); 
            z-index: 1; 
            pointer-events: none; 
        }

        #home-watermark {
            top: 75%; 
            left: 50%;
        }

        #away-watermark {
            top: 25%; 
            left: 50%;
        }

        /* --- Player Nodes --- */
        .player-node {
            position: absolute;
            width: 140px; /* INCREASED to fit larger photo container */
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -50%);
            transition: all 0.5s ease;
        }

        .player-photo-container {
            width: 100px;  /* INCREASED from 72px */
            height: 100px; /* INCREASED from 72px */
            border-radius: 50%;
            border: 4px solid var(--node-color); 
            background-color: #2b3035;
            box-shadow: 0 6px 12px rgba(0,0,0,0.7);
            z-index: 3; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .player-photo { width: 100%; height: 100%; object-fit: cover; }
        .fallback-initials { font-size: 36px; /* INCREASED to match larger circle */ font-weight: bold; color: #adb5bd; }

        .player-number {
            position: absolute;
            top: -5px; 
            right: 5px; 
            background-color: #111;
            color: white;
            border: 2px solid var(--node-color);
            width: 40px; /* INCREASED */
            height: 40px; /* INCREASED */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px; /* INCREASED */
            font-weight: bold;
            z-index: 4;
        }

        .player-nameplate {
            margin-top: -15px; /* ADJUSTED overlap for larger circle */
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 5px 14px; 
            border-radius: 8px;
            font-size: 18px; /* Slightly larger text */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 4;
            white-space: nowrap;
            box-shadow: 0 3px 6px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

    <div id="controls">
        <label fw-bold>Select Match:</label>
        <select id="match-selector"></select>
        <button onclick="takeScreenshot()">Simulate Screenshot</button>
        <button id="copy-btn" onclick="copyTweetText()">📋 Copy Tweet Text</button>
    </div>

    <div id="capture-area">
        <div id="header">
            <div class="team-block home">
                <div class="team-info-text">
                    <h1 id="home-name" class="team-name">HOME</h1>
                    <div id="home-formation" class="formation">4-3-3</div>
                </div>
                <img id="home-logo" class="team-logo" src="" alt="Home Logo">
            </div>

            <div class="vs-badge">VS</div>

            <div class="team-block away">
                <img id="away-logo" class="team-logo" src="" alt="Away Logo">
                <div class="team-info-text">
                    <h1 id="away-name" class="team-name">AWAY</h1>
                    <div id="away-formation" class="formation">4-3-3</div>
                </div>
            </div>
        </div>

        <div id="scene">
            <div id="pitch">
                <img id="away-watermark" class="watermark" src="" alt="">
                <img id="home-watermark" class="watermark" src="" alt="">

                <div class="pitch-line center-circle"></div>
                <div class="center-dot"></div>
                <div class="halfway-line"></div>
                
                <div class="pitch-line penalty-box-bottom"></div>
                <div class="six-yard-bottom"></div>
                <div class="penalty-arc-bottom"></div>

                <div class="pitch-line penalty-box-top"></div>
                <div class="six-yard-top"></div>
                <div class="penalty-arc-top"></div>
                
                <div id="players-container">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let allMatches = [];

        async function loadData() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                let targetDate = urlParams.get('date');
                
                if (!targetDate) {
                    const today = new Date();
                    targetDate = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
                }

                const res = await fetch(`data/games_${targetDate}.json`); 
                if (res.ok) {
                    const data = await res.json();
                    allMatches = data.filter(m => m.homeLineup && m.homeLineup.startXI && m.awayLineup && m.awayLineup.startXI);
                } else throw new Error("File not found");
            } catch (e) {
                console.log(`Failed to load data for ${targetDate}.`);
            }
            populateDropdown();
            
            const urlParams = new URLSearchParams(window.location.search);
            const targetFixture = urlParams.get('fixture');
            
            if (targetFixture && allMatches.find(m => m.fixture.id == targetFixture)) {
                document.getElementById('match-selector').value = targetFixture;
                renderMatch(parseInt(targetFixture));
            } else if (allMatches.length > 0) {
                renderMatch(allMatches[0].fixture.id);
            }
        }

        function populateDropdown() {
            const select = document.getElementById('match-selector');
            select.innerHTML = '';
            allMatches.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.fixture.id;
                opt.textContent = `${m.teams.home.name} vs ${m.teams.away.name}`;
                select.appendChild(opt);
            });
            select.addEventListener('change', (e) => { renderMatch(parseInt(e.target.value)); });
        }

        function sliceArrayByFormation(formationStr, startXI) {
            const parts = formationStr.split('-').map(Number);
            const rows = [];
            rows.push([startXI[0]]);
            let currentIndex = 1;
            for (let i = 0; i < parts.length; i++) {
                const count = parts[i];
                rows.push(startXI.slice(currentIndex, currentIndex + count));
                currentIndex += count;
            }
            return rows;
        }

        function getYPositions(numRows, isHome) {
            const homeStart = 95, homeEnd = 58;
            const awayStart = 5, awayEnd = 42;

            if (isHome) {
                const step = (homeStart - homeEnd) / Math.max(1, numRows - 1);
                return Array.from({length: numRows}, (_, i) => homeStart - (step * i));
            } else {
                const step = (awayEnd - awayStart) / Math.max(1, numRows - 1);
                return Array.from({length: numRows}, (_, i) => awayStart + (step * i));
            }
        }

        function getXPositions(numPlayers) {
            if (numPlayers === 1) return [50];
            if (numPlayers === 2) return [35, 65]; 
            if (numPlayers === 3) return [20, 50, 80];
            if (numPlayers === 4) return [15, 38.33, 61.66, 85];
            if (numPlayers === 5) return [10, 30, 50, 70, 90];
            if (numPlayers === 6) return [8, 24.8, 41.6, 58.4, 75.2, 92];
            
            let positions = [];
            let step = 80 / (numPlayers - 1);
            for(let i=0; i<numPlayers; i++) {
                positions.push(10 + (step * i));
            }
            return positions;
        }

        function renderMatch(fixtureId) {
            const match = allMatches.find(m => m.fixture.id === fixtureId);
            if (!match) return;

            document.getElementById('home-name').textContent = match.teams.home.name;
            document.getElementById('home-logo').src = match.teams.home.logo;
            document.getElementById('home-formation').textContent = match.homeLineup.formation;

            document.getElementById('away-name').textContent = match.teams.away.name;
            document.getElementById('away-logo').src = match.teams.away.logo;
            document.getElementById('away-formation').textContent = match.awayLineup.formation;

            // Set central watermarks
            document.getElementById('home-watermark').src = match.teams.home.logo;
            document.getElementById('away-watermark').src = match.teams.away.logo;

            let homeColor = match.homeLineup.team?.colors?.player?.primary ? `#${match.homeLineup.team.colors.player.primary}` : '#ffffff';
            let awayColor = match.awayLineup.team?.colors?.player?.primary ? `#${match.awayLineup.team.colors.player.primary}` : '#dddddd';

            const container = document.getElementById('players-container');
            container.innerHTML = '';

            const homeRows = sliceArrayByFormation(match.homeLineup.formation, match.homeLineup.startXI);
            const awayRows = sliceArrayByFormation(match.awayLineup.formation, match.awayLineup.startXI);

            function drawTeam(rows, isHome, teamColor) {
                const numRows = rows.length;
                const yPositions = getYPositions(numRows, isHome); 
                
                rows.forEach((rowPlayers, rowIndex) => {
                    if (!rowPlayers || rowPlayers.length === 0) return;
                    
                    const yPos = yPositions[rowIndex];
                    const numPlayers = rowPlayers.length;
                    const xPositions = getXPositions(numPlayers); 
                    
                    const playersToDraw = isHome ? [...rowPlayers].reverse() : rowPlayers;

                    const baseZIndex = isHome ? (100 - rowIndex) : (10 + rowIndex);

                    playersToDraw.forEach((slot, colIndex) => {
                        const p = slot.player;
                        const xPos = xPositions[colIndex];

                        const nameParts = p.name.split(' ');
                        let displayName = nameParts.length > 1 ? nameParts[nameParts.length - 1] : p.name;
                        if (displayName.length > 12) displayName = displayName.substring(0, 10) + '.';

                        let photoHtml = `<div class="fallback-initials">${p.name.charAt(0).toUpperCase()}</div>`;
                        if (p.photo && p.photo.includes("http")) {
                            photoHtml = `<img src="${p.photo}" class="player-photo" crossorigin="anonymous">`;
                        }

                        const nodeHtml = `
                            <div class="player-node" style="left: ${xPos}%; top: ${yPos}%; z-index: ${baseZIndex}; --node-color: ${teamColor};">
                                <div class="player-photo-container">
                                    <div class="player-number">${p.number || ''}</div>
                                    ${photoHtml}
                                </div>
                                <div class="player-nameplate">${displayName}</div>
                            </div>
                        `;
                        container.insertAdjacentHTML('beforeend', nodeHtml);
                    });
                });
            }

            drawTeam(awayRows, false, awayColor);
            drawTeam(homeRows, true, homeColor);
        }

        function takeScreenshot() {
            const capture = document.getElementById('capture-area');
            capture.style.opacity = '0.5';
            setTimeout(() => { capture.style.opacity = '1'; }, 100);
            alert("Ready! Your Python bot will capture this mobile-optimized 1080x1350 layout.");
        }

        function copyTweetText() {
            const select = document.getElementById('match-selector');
            const match = allMatches.find(m => m.fixture.id === parseInt(select.value));
            if (!match) return;

            const homeName = match.teams.home.name;
            const awayName = match.teams.away.name;
            const homeHashtag = "#" + homeName.replace(/[^a-zA-Z0-9]/g, '');
            const awayHashtag = "#" + awayName.replace(/[^a-zA-Z0-9]/g, '');

            const tweetText = `🚨 Official Starting XI 🚨\n\n⚽ ${homeName} vs ${awayName}\n\n${homeHashtag} ${awayHashtag}`;

            navigator.clipboard.writeText(tweetText).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.textContent = "✅ Copied!";
                btn.style.backgroundColor = "#198754";
                btn.style.borderColor = "#198754";
                setTimeout(() => {
                    btn.textContent = "📋 Copy Tweet Text";
                    btn.style.backgroundColor = "#333";
                    btn.style.borderColor = "#444";
                }, 2000);
            });
        }

        loadData();
    </script>
</body>
</html>
