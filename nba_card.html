<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Starting 5 - Tactical Square</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&family=Oswald:wght@500;700&family=Montserrat:ital,wght@0,800;1,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Default Fallback Colors */
            --team-primary: #17408B; 
            --team-secondary: #C9082A;
            --bg-dark: #0a0b0d;
            --text-light: #f8f9fa;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #000;
            font-family: 'Oswald', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- UI Controls --- */
        #controls {
            margin-bottom: 20px;
            background: #222;
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            z-index: 100;
        }

        select, button {
            padding: 8px 16px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #333;
            color: white;
            cursor: pointer;
            font-family: 'Oswald', sans-serif;
        }

        button:hover { background: #555; }

        /* =========================================
           THE EXPORTABLE CANVAS (1080x1080 SQUARE)
           ========================================= */
        #capture-area {
            width: 1080px;
            height: 1080px; 
            background-color: var(--bg-dark);
            /* Subtle Dark Hardwood Floor CSS Pattern */
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 100px, transparent 100px);
            background-size: 40px 100px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            color: var(--text-light);
            border-top: 15px solid var(--team-primary);
            border-bottom: 15px solid var(--team-primary);
        }

        /* Top Glowing Light Effect */
        .arena-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 350px;
            background: radial-gradient(ellipse at top, var(--team-primary) 0%, transparent 70%);
            opacity: 0.3;
            z-index: 1;
            pointer-events: none;
        }

        /* --- Header Section --- */
        #header {
            width: 100%;
            box-sizing: border-box;
            padding: 30px 50px 10px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }

        .header-left { display: flex; flex-direction: column; }

        .starting-tag {
            font-family: 'Teko', sans-serif;
            font-size: 40px; 
            color: var(--team-primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        #team-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 75px; 
            margin: 0;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 4px 4px 0px var(--team-primary);
        }

        #matchup-info {
            font-family: 'Oswald', sans-serif;
            font-size: 24px;
            color: #ccc;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #team-logo {
            width: 140px; 
            height: 140px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* --- Tactical Half-Court --- */
        #court-scene {
            width: 100%;
            height: 850px; 
            position: absolute;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        #court {
            width: 960px; 
            height: 800px; 
            position: relative;
            border: 4px solid var(--team-primary);
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* Court Painted Lines */
        .paint-area {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 350px; 
            border: 4px solid var(--team-primary);
            border-bottom: none;
            background: linear-gradient(to top, rgba(255,255,255,0.05), transparent);
        }

        .free-throw-circle {
            position: absolute;
            bottom: 350px; 
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 60px; 
            border: 4px solid var(--team-primary);
            border-bottom: none; 
            border-radius: 60px 60px 0 0; 
            background: transparent; 
            z-index: 1;
        }

        .three-point-arc {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 550px; 
            border: 4px solid var(--team-primary);
            border-radius: 50% 50% 0 0;
            border-bottom: none;
            clip-path: inset(0 0 80px 0); 
            box-sizing: border-box; 
        }

        .corner-three-left { position: absolute; bottom: 0; left: 80px; width: 4px; height: 81px; background: var(--team-primary); }
        .corner-three-right { position: absolute; bottom: 0; right: 80px; width: 4px; height: 81px; background: var(--team-primary); }

        .half-court-circle {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; 
            height: 250px; 
            border: 4px solid var(--team-primary);
            border-radius: 50%;
        }

        /* The Massive Ghost Watermark */
        .watermark-logo {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px; 
            height: 500px; 
            object-fit: contain;
            opacity: 0.15; 
            z-index: 0;
            pointer-events: none;
            filter: grayscale(100%) brightness(150%);
        }

        /* --- Player Nodes --- */
        .player-node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* Groups the photo and the floating badges together */
        .photo-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .player-photo-container {
            width: 155px;  
            height: 155px; 
            border-radius: 50%;
            border: 5px solid var(--team-secondary); 
            background-color: #222;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 12;
            overflow: hidden;
            display: flex;
            justify-content: center;
            /* CHANGED TO FLEX-START: Aligns the top of the image to the top of the circle */
            align-items: flex-start; 
            position: relative;
        }

        /* FIXED ZOOM & OFFSET TO PREVENT CROPPING HEADS */
        .player-photo { 
            width: 115%; /* Reduced from 130% so it fits better */
            height: 115%; 
            object-fit: cover; 
            /* Pulls the image 15px down from the top edge so the head clears the curve! */
            object-position: center 15px; 
        }
        
        .fallback-silhouette {
            width: 70%;
            height: 90%;
            background: #444;
            clip-path: polygon(20% 100%, 20% 60%, 40% 40%, 40% 20%, 60% 20%, 60% 40%, 80% 60%, 80% 100%);
            opacity: 0.6;
            margin-top: 15px; /* Push the silhouette down slightly too */
        }

        /* UPPER LEFT FLOATING POSITION */
        .player-position {
            position: absolute;
            top: -5px; 
            left: -5px; 
            background-color: var(--team-primary);
            color: white;
            border: 3px solid var(--team-secondary);
            width: 48px; 
            height: 48px; 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Teko', sans-serif;
            font-size: 24px; 
            font-weight: bold;
            z-index: 15;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
        }

        /* UPPER RIGHT FLOATING NUMBER */
        .player-number {
            position: absolute;
            top: -5px; 
            right: -5px; 
            background-color: #111;
            color: white;
            border: 3px solid var(--team-secondary);
            width: 48px; 
            height: 48px; 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Teko', sans-serif;
            font-size: 26px; 
            font-weight: bold;
            z-index: 15;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
        }

        /* UNIFIED NAMEPLATE */
        .nameplate-wrapper {
            display: flex;
            align-items: stretch;
            margin-top: -18px; 
            z-index: 14;
            box-shadow: 0 5px 10px rgba(0,0,0,0.8);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .player-nameplate {
            background: rgba(10, 10, 10, 0.95);
            padding: 6px 20px; 
            font-family: 'Montserrat', sans-serif;
            font-size: 20px; 
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="controls">
        <label>Game:</label>
        <select id="game-selector"></select>
        
        <label>Team:</label>
        <select id="team-selector">
            <option value="home">Home Team</option>
            <option value="away">Away Team</option>
        </select>
        
        <button onclick="takeScreenshot()">Simulate Screenshot</button>
    </div>

    <div id="capture-area">
        <div class="arena-glow"></div>
        
        <div id="header">
            <div class="header-left">
                <div class="starting-tag">Starting 5</div>
                <h1 id="team-name">LOADING...</h1>
                <div id="matchup-info">FETCHING DATA...</div>
            </div>
            <img id="team-logo" src="" alt="Team Logo">
        </div>

        <div id="court-scene">
            <div id="court">
                <div class="half-court-circle"></div>
                <div class="three-point-arc"></div>
                <div class="corner-three-left"></div>
                <div class="corner-three-right"></div>
                <div class="free-throw-circle"></div>
                <div class="paint-area"></div>
                
                <img id="watermark" class="watermark-logo" src="" alt="">

                <div id="players-container">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const NBA_TEAMS = {
            "ATL": { name: "Hawks", primary: "#e03a3e", secondary: "#c1d32f", id: 1610612737 },
            "BOS": { name: "Celtics", primary: "#007A33", secondary: "#ba9653", id: 1610612738 },
            "BKN": { name: "Nets", primary: "#ffffff", secondary: "#000000", id: 1610612751 },
            "CHA": { name: "Hornets", primary: "#1d1160", secondary: "#00788c", id: 1610612766 },
            "CHI": { name: "Bulls", primary: "#ce1141", secondary: "#000000", id: 1610612741 },
            "CLE": { name: "Cavaliers", primary: "#860038", secondary: "#041e42", id: 1610612739 },
            "DAL": { name: "Mavericks", primary: "#00538c", secondary: "#002b5e", id: 1610612742 },
            "DEN": { name: "Nuggets", primary: "#0e2240", secondary: "#fec524", id: 1610612743 },
            "DET": { name: "Pistons", primary: "#c8102e", secondary: "#1d42ba", id: 1610612765 },
            "GSW": { name: "Warriors", primary: "#1d428a", secondary: "#ffc72c", id: 1610612744 },
            "HOU": { name: "Rockets", primary: "#ce1141", secondary: "#000000", id: 1610612745 },
            "IND": { name: "Pacers", primary: "#002d62", secondary: "#fdbb30", id: 1610612754 },
            "LAC": { name: "Clippers", primary: "#c8102e", secondary: "#1d428a", id: 1610612746 },
            "LAL": { name: "Lakers", primary: "#552583", secondary: "#fdb927", id: 1610612747 },
            "MEM": { name: "Grizzlies", primary: "#5d76a9", secondary: "#12173f", id: 1610612763 },
            "MIA": { name: "Heat", primary: "#98002e", secondary: "#f9a01b", id: 1610612748 },
            "MIL": { name: "Bucks", primary: "#00471b", secondary: "#eee1c6", id: 1610612749 },
            "MIN": { name: "Timberwolves", primary: "#0c2340", secondary: "#236192", id: 1610612750 },
            "NOP": { name: "Pelicans", primary: "#0c2340", secondary: "#c8102e", id: 1610612740 },
            "NYK": { name: "Knicks", primary: "#006bb6", secondary: "#f58426", id: 1610612752 },
            "OKC": { name: "Thunder", primary: "#007ac1", secondary: "#ef3b24", id: 1610612760 },
            "ORL": { name: "Magic", primary: "#0077c0", secondary: "#c4ced4", id: 1610612753 },
            "PHI": { name: "76ers", primary: "#006bb6", secondary: "#ed174c", id: 1610612755 },
            "PHX": { name: "Suns", primary: "#1d1160", secondary: "#e56020", id: 1610612756 },
            "POR": { name: "Trail Blazers", primary: "#e03a3e", secondary: "#000000", id: 1610612757 },
            "SAC": { name: "Kings", primary: "#5a2d81", secondary: "#63727a", id: 1610612758 },
            "SAS": { name: "Spurs", primary: "#c4ced4", secondary: "#000000", id: 1610612759 },
            "TOR": { name: "Raptors", primary: "#ce1141", secondary: "#000000", id: 1610612761 },
            "UTA": { name: "Jazz", primary: "#002b5c", secondary: "#00471b", id: 1610612762 },
            "WAS": { name: "Wizards", primary: "#002b5c", secondary: "#e31837", id: 1610612764 }
        };

        const POSITIONS = ["PG", "SG", "SF", "PF", "C"];
        
        const COURT_COORDS = [
            { x: 50, y: 15 }, // PG
            { x: 18, y: 42 }, // SG
            { x: 82, y: 42 }, // SF
            { x: 32, y: 75 }, // PF
            { x: 68, y: 75 }  // C
        ];

        let allGames = [];
        let playerDatabase = {}; 

        function getNbaLogo(abbr) {
            const team = NBA_TEAMS[abbr];
            if(team) return `https://cdn.nba.com/logos/nba/${team.id}/global/L/logo.svg`;
            return ''; 
        }

        function getPlayerData(playerName) {
            for (const key in playerDatabase) {
                if (playerDatabase[key].name === playerName || playerDatabase[key].short_name === playerName) {
                    return playerDatabase[key]; 
                }
            }
            return null; 
        }

        async function loadData() {
            try {
                const [nbaRes, playersRes] = await Promise.all([
                    fetch('https://nbastartingfive.com/nba_data.json'),
                    fetch('data/players.json') 
                ]);
                
                if (nbaRes.ok) {
                    const data = await nbaRes.json();
                    allGames = data.games.filter(g => g.teams && g.rosters && g.rosters[g.teams[0]] && g.rosters[g.teams[0]].players.length >= 5);
                }
                
                if (playersRes.ok) {
                    playerDatabase = await playersRes.json();
                    console.log("✅ Player Database loaded successfully!");
                }

            } catch (e) {
                console.error("Failed to load data.", e);
            }
            
            populateDropdown();
            
            if (allGames.length > 0) {
                renderCard();
            } else {
                document.getElementById('team-name').textContent = "NO LINEUPS YET";
                document.getElementById('matchup-info').textContent = "Check back closer to tipoff.";
            }
        }

        function populateDropdown() {
            const select = document.getElementById('game-selector');
            select.innerHTML = '';
            allGames.forEach((g, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = `${g.teams[0]} @ ${g.teams[1]}`;
                select.appendChild(opt);
            });
            select.addEventListener('change', () => renderCard());
            document.getElementById('team-selector').addEventListener('change', () => renderCard());
        }

        function applyTeamTheme(abbr) {
            const theme = NBA_TEAMS[abbr];
            if (theme) {
                let primaryColor = theme.primary === "#ffffff" ? theme.secondary : theme.primary;
                document.documentElement.style.setProperty('--team-primary', primaryColor);
                document.documentElement.style.setProperty('--team-secondary', theme.secondary);
            }
        }

        function renderCard() {
            if(allGames.length === 0) return;

            const gameIdx = document.getElementById('game-selector').value;
            const side = document.getElementById('team-selector').value;
            const game = allGames[gameIdx];

            const awayAbbr = game.teams[0];
            const homeAbbr = game.teams[1];
            
            const targetAbbr = side === 'home' ? homeAbbr : awayAbbr;
            const oppAbbr = side === 'home' ? awayAbbr : homeAbbr;
            const isHome = side === 'home';

            const targetData = NBA_TEAMS[targetAbbr];
            const oppData = NBA_TEAMS[oppAbbr];

            applyTeamTheme(targetAbbr);

            document.getElementById('team-name').textContent = targetData ? targetData.name : targetAbbr;
            document.getElementById('matchup-info').textContent = `${isHome ? 'VS' : '@'} ${oppData ? oppData.name : oppAbbr}  |  ${game.date}`;
            
            const logoUrl = getNbaLogo(targetAbbr);
            document.getElementById('team-logo').src = logoUrl;
            document.getElementById('watermark').src = logoUrl;

            const container = document.getElementById('players-container');
            container.innerHTML = '';

            const roster = game.rosters[targetAbbr].players.slice(0, 5);

            roster.forEach((player, index) => {
                const pos = POSITIONS[index];
                const coords = COURT_COORDS[index];
                
                const dbPlayer = getPlayerData(player.name);
                const photoUrl = dbPlayer ? dbPlayer.photo : null;
                const jerseyNum = dbPlayer && dbPlayer.jersey ? dbPlayer.jersey : "";

                const nameParts = player.name.split(' ');
                let lastName = nameParts.length > 1 ? nameParts.slice(1).join(' ') : player.name;
                if (lastName.length > 12) lastName = lastName.substring(0, 10) + '.';

                const photoHtml = photoUrl 
                    ? `<img src="${photoUrl}" class="player-photo" crossorigin="anonymous">` 
                    : `<div class="fallback-silhouette"></div>`;

                const html = `
                    <div class="player-node" style="left: ${coords.x}%; top: ${coords.y}%;">
                        <div class="photo-wrapper">
                            <div class="player-position">${pos}</div>
                            ${jerseyNum ? `<div class="player-number">${jerseyNum}</div>` : ''}
                            <div class="player-photo-container">
                                ${photoHtml}
                            </div>
                        </div>
                        <div class="nameplate-wrapper">
                            <div class="player-nameplate">${lastName}</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function takeScreenshot() {
            const capture = document.getElementById('capture-area');
            capture.style.opacity = '0.5';
            setTimeout(() => { capture.style.opacity = '1'; }, 100);
            alert("Ready! Playwright will capture #capture-area as a 1080x1080 square.");
        }

        loadData();
    </script>
</body>
</html>
