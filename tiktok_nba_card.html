<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Finals Game 3 - Tale of the Tape</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&family=Oswald:wght@500;700&family=Montserrat:ital,wght@0,800;1,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --away-primary: #1d428a; 
            --away-secondary: #ffc72c;
            --home-primary: #552583;
            --home-secondary: #fdb927;
            --bg-wood: #eacc98; 
            --text-dark: #111; 
        }

        body { margin: 0; padding: 20px; background-color: #050302; font-family: 'Oswald', sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        #controls { margin-bottom: 20px; background: #222; padding: 15px 25px; border-radius: 8px; display: flex; gap: 15px; align-items: center; color: white; z-index: 2000; }
        select, button, input { padding: 8px 16px; font-size: 16px; border-radius: 4px; border: 1px solid #555; background: #333; color: white; cursor: pointer; font-family: 'Oswald', sans-serif; }
        button:hover { background: #555; }

        /* --- TIKTOK VERTICAL FORMAT: 1080 x 1920 --- */
        #capture-area {
            width: 1080px; height: 1920px; background-color: var(--bg-wood);
            background-image: repeating-linear-gradient(to right, rgba(0, 0, 0, 0.05) 0px, rgba(0, 0, 0, 0.05) 50px, rgba(255, 255, 255, 0.05) 50px, rgba(255, 255, 255, 0.05) 100px);
            position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; color: var(--text-dark);
        }

        @keyframes arenaQuake { 0% { transform: translate(0, 0) scale(1); } 20% { transform: translate(-10px, 10px) scale(1.02); } 40% { transform: translate(10px, -10px) scale(1.02); } 60% { transform: translate(-10px, -5px) scale(1.02); } 80% { transform: translate(10px, 5px) scale(1.02); } 100% { transform: translate(0, 0) scale(1); } }
        .quake-active { animation: arenaQuake 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97); }

        /* --- DUAL COURT SETUP --- */
        #court-scene { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; }
        
        .half-court { width: 100%; height: 50%; position: relative; }
        
        /* Away Half (Top) - Rotated court markings */
        #away-half { border-bottom: 4px solid var(--away-primary); }
        #away-half .paint-area { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 340px; height: 450px; border: 4px solid var(--away-primary); border-top: none; background: rgba(0, 0, 0, 0.05); }
        #away-half .free-throw-circle { position: absolute; top: 450px; left: 50%; transform: translateX(-50%); width: 140px; height: 70px; border: 4px solid var(--away-primary); border-top: none; border-radius: 0 0 70px 70px; }
        #away-half .three-point-arc { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 850px; height: 700px; border: 4px solid var(--away-primary); border-radius: 0 0 50% 50%; border-top: none; clip-path: inset(100px 0 0 0); box-sizing: border-box; }
        #away-half .corner-three-left { position: absolute; top: 0; left: 65px; width: 4px; height: 101px; background: var(--away-primary); }
        #away-half .corner-three-right { position: absolute; top: 0; right: 65px; width: 4px; height: 101px; background: var(--away-primary); }

        /* Home Half (Bottom) - Standard court markings */
        #home-half { border-top: 4px solid var(--home-primary); }
        #home-half .paint-area { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 340px; height: 450px; border: 4px solid var(--home-primary); border-bottom: none; background: rgba(0, 0, 0, 0.05); }
        #home-half .free-throw-circle { position: absolute; bottom: 450px; left: 50%; transform: translateX(-50%); width: 140px; height: 70px; border: 4px solid var(--home-primary); border-bottom: none; border-radius: 70px 70px 0 0; }
        #home-half .three-point-arc { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 850px; height: 700px; border: 4px solid var(--home-primary); border-radius: 50% 50% 0 0; border-bottom: none; clip-path: inset(0 0 100px 0); box-sizing: border-box; }
        #home-half .corner-three-left { position: absolute; bottom: 0; left: 65px; width: 4px; height: 101px; background: var(--home-primary); }
        #home-half .corner-three-right { position: absolute; bottom: 0; right: 65px; width: 4px; height: 101px; background: var(--home-primary); }

        /* Center Circle */
        .center-circle-top { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 300px; height: 150px; border: 4px solid var(--away-primary); border-bottom: none; border-radius: 150px 150px 0 0; }
        .center-circle-bottom { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 300px; height: 150px; border: 4px solid var(--home-primary); border-top: none; border-radius: 0 0 150px 150px; }

        /* The Fault Line */
        #fault-line { position: absolute; top: 50%; left: 0; width: 100%; height: 8px; transform: translateY(-50%); background: linear-gradient(90deg, var(--away-primary) 0%, #fff 50%, var(--home-primary) 100%); box-shadow: 0 0 20px rgba(255,255,255,0.8); z-index: 5; transition: opacity 0.5s ease; }
        .shatter-line { opacity: 0 !important; }

        /* --- WATERMARKS --- */
        .broadcast-watermark { position: absolute; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; pointer-events: none; opacity: 0.35; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        .court-logo { width: 420px; height: 420px; object-fit: contain; filter: grayscale(0.5) contrast(1.2); }
        #top-watermark { top: 25%; }
        #bottom-watermark { top: 75%; }

        /* --- CLIMAX TEXT --- */
        #game7-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.5);
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-style: italic; font-size: 75px;
            color: #fff; letter-spacing: 2px; text-transform: uppercase; text-align: center; line-height: 1.0;
            z-index: 100; white-space: nowrap; opacity: 0; pointer-events: none;
            text-shadow: 0 15px 30px rgba(0,0,0,0.9);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .reveal-game7 { opacity: 1 !important; transform: translate(-50%, -50%) scale(1) !important; }

        /* --- CANVAS LIGHTING ENGINE --- */
        #spotlight-canvas { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; z-index: 20; opacity: 1; pointer-events: none; transition: opacity 1.0s ease; }
        
        /* ========================================================
           THE PLAYER CARDS
           ======================================================== */
        #players-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; }
        
        .player-node { 
            position: absolute; display: flex; flex-direction: column; align-items: center;
            width: 200px; height: 260px; z-index: 20;
        }
        
        .player-cutout-wrapper {
            position: relative; z-index: 10; width: 100%; height: 190px; 
            display: flex; justify-content: center; align-items: flex-end; 
            transition: transform 0.4s ease;
        }

        .player-photo {
            height: 100%; width: auto; object-fit: contain; object-position: bottom center;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.7)); transition: filter 0.4s ease;
        }

        .player-highlight { transform: scale(1.15) translateY(-5px); }
        .player-highlight.away-node .player-photo { filter: brightness(1.2) drop-shadow(0 0 20px var(--away-primary)) drop-shadow(0 15px 10px rgba(0,0,0,0.9)); }
        .player-highlight.home-node .player-photo { filter: brightness(1.2) drop-shadow(0 0 20px var(--home-primary)) drop-shadow(0 15px 10px rgba(0,0,0,0.9)); }

        .player-hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; pointer-events: none; z-index: 30;
            transition: opacity 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .hud-reveal { opacity: 1; }

        .hud-pos, .hud-num {
            position: absolute; bottom: 140px; 
            font-family: 'Teko', sans-serif; font-size: 30px; font-weight: bold; color: var(--text-dark);
            background: #fff; padding: 2px 10px; border-radius: 6px; line-height: 1.1;
        }
        .away-node .hud-pos, .away-node .hud-num { border: 3px solid var(--away-secondary); box-shadow: 2px 2px 0 var(--away-primary); }
        .home-node .hud-pos, .home-node .hud-num { border: 3px solid var(--home-secondary); box-shadow: 2px 2px 0 var(--home-primary); }
        .hud-pos { left: 5px; } .hud-num { right: 5px; } 

        .hud-name {
            position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%);
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 18px; color: #fff;
            text-align: center; white-space: nowrap; text-transform: uppercase;
            padding: 6px 18px; border-radius: 6px; border: 2px solid #fff;
            box-shadow: 0 8px 15px rgba(0,0,0,0.6);
        }
        .away-node .hud-name { background: var(--away-primary); box-shadow: 0 8px 15px rgba(0,0,0,0.6), 3px 3px 0 var(--away-secondary); }
        .home-node .hud-name { background: var(--home-primary); box-shadow: 0 8px 15px rgba(0,0,0,0.6), 3px 3px 0 var(--home-secondary); }
        
        .hud-reveal .typewriter-char { opacity: 0; animation: typeLetter 0.01s forwards; display: inline-block; }
        @keyframes typeLetter { to { opacity: 1; } }

        /* ========================================================
           3D JUMP ENTRANCES (Z-AXIS)
           ======================================================== */
        @keyframes jump0 { 0% { top: 120%; left: 50%; transform: translate(-50%, -50%) scale(0.2); opacity: 0; } 50% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.8); opacity: 1; } 100% { top: var(--final-y); left: var(--final-x); transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes jump1 { 0% { top: -20%; left: 50%; transform: translate(-50%, -50%) scale(0.2); opacity: 0; } 50% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.8); opacity: 1; } 100% { top: var(--final-y); left: var(--final-x); transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes jump2 { 0% { top: 50%; left: -20%; transform: translate(-50%, -50%) scale(0.2); opacity: 0; } 50% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.8); opacity: 1; } 100% { top: var(--final-y); left: var(--final-x); transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes jump3 { 0% { top: 50%; left: 120%; transform: translate(-50%, -50%) scale(0.2); opacity: 0; } 50% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.8); opacity: 1; } 100% { top: var(--final-y); left: var(--final-x); transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes jump4 { 0% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.2); opacity: 0; } 50% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.8); opacity: 1; } 100% { top: var(--final-y); left: var(--final-x); transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes jump5 { 0% { top: 120%; left: -20%; transform: translate(-50%, -50%) scale(0.2); opacity: 0; } 50% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.8); opacity: 1; } 100% { top: var(--final-y); left: var(--final-x); transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes jump6 { 0% { top: -20%; left: 120%; transform: translate(-50%, -50%) scale(0.2); opacity: 0; } 50% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.8); opacity: 1; } 100% { top: var(--final-y); left: var(--final-x); transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes jump7 { 0% { top: 120%; left: 120%; transform: translate(-50%, -50%) scale(0.2); opacity: 0; } 50% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.8); opacity: 1; } 100% { top: var(--final-y); left: var(--final-x); transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes jump8 { 0% { top: -20%; left: -20%; transform: translate(-50%, -50%) scale(0.2); opacity: 0; } 50% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.8); opacity: 1; } 100% { top: var(--final-y); left: var(--final-x); transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes jump9 { 0% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.2) rotate(-360deg); opacity: 0; } 50% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(2.8) rotate(-180deg); opacity: 1; } 100% { top: var(--final-y); left: var(--final-x); transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; } }

        .anim-jump-0 { animation: jump0 1.2s cubic-bezier(0.25, 1, 0.5, 1) var(--entrance-delay) both; }
        .anim-jump-1 { animation: jump1 1.2s cubic-bezier(0.25, 1, 0.5, 1) var(--entrance-delay) both; }
        .anim-jump-2 { animation: jump2 1.2s cubic-bezier(0.25, 1, 0.5, 1) var(--entrance-delay) both; }
        .anim-jump-3 { animation: jump3 1.2s cubic-bezier(0.25, 1, 0.5, 1) var(--entrance-delay) both; }
        .anim-jump-4 { animation: jump4 1.2s cubic-bezier(0.25, 1, 0.5, 1) var(--entrance-delay) both; }
        .anim-jump-5 { animation: jump5 1.2s cubic-bezier(0.25, 1, 0.5, 1) var(--entrance-delay) both; }
        .anim-jump-6 { animation: jump6 1.2s cubic-bezier(0.25, 1, 0.5, 1) var(--entrance-delay) both; }
        .anim-jump-7 { animation: jump7 1.2s cubic-bezier(0.25, 1, 0.5, 1) var(--entrance-delay) both; }
        .anim-jump-8 { animation: jump8 1.2s cubic-bezier(0.25, 1, 0.5, 1) var(--entrance-delay) both; }
        .anim-jump-9 { animation: jump9 1.2s cubic-bezier(0.25, 1, 0.5, 1) var(--entrance-delay) both; }

        /* SHOCKWAVE RING */
        .shockwave-ring { position: absolute; top: 80%; left: 50%; width: 140px; height: 140px; border-radius: 50%; border: 8px solid #fff; transform: translate(-50%, -50%) scale(0.5); opacity: 0; z-index: 11; pointer-events: none; }
        .away-node .shockwave-ring { border-color: var(--away-primary); }
        .home-node .shockwave-ring { border-color: var(--home-primary); }
        @keyframes ringExplode { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; border-width: 2px; } }
        .anim-shockwave { animation: ringExplode 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }

    </style>
</head>
<body>

    <div id="controls">
        <label>Date:</label>
        <input type="text" id="date-indicator" readonly style="width: 100px; text-align: center;">
        <label>Game:</label>
        <select id="game-selector"></select>
        <button onclick="takeScreenshot()">Simulate Screenshot</button>
    </div>

    <div id="capture-area">
        
        <div id="court-scene">
            <div id="away-half" class="half-court">
                <div class="three-point-arc"></div>
                <div class="corner-three-left"></div>
                <div class="corner-three-right"></div>
                <div class="free-throw-circle"></div>
                <div class="paint-area"></div>
                <div class="center-circle-top"></div>
            </div>

            <div id="home-half" class="half-court">
                <div class="three-point-arc"></div>
                <div class="corner-three-left"></div>
                <div class="corner-three-right"></div>
                <div class="free-throw-circle"></div>
                <div class="paint-area"></div>
                <div class="center-circle-bottom"></div>
            </div>
            
            <div id="fault-line"></div>
            
            <div id="top-watermark" class="broadcast-watermark">
                <img id="away-logo" class="court-logo" src="" alt="">
            </div>
            
            <div id="bottom-watermark" class="broadcast-watermark">
                <img id="home-logo" class="court-logo" src="" alt="">
            </div>
            
            <div id="players-container"></div>
            
            <div id="game7-text">NBA FINALS<br>GAME 3<br>WELCOME TO THE JUNGLE</div>
        </div>

        <canvas id="spotlight-canvas" width="1080" height="1920"></canvas>
    </div>

    <script>
        const NBA_TEAMS = {
            "ATL": { name: "Hawks", primary: "#e03a3e", secondary: "#c1d32f" },
            "BOS": { name: "Celtics", primary: "#007A33", secondary: "#ba9653" },
            "BKN": { name: "Nets", primary: "#000000", secondary: "#ffffff" }, 
            "CHA": { name: "Hornets", primary: "#1d1160", secondary: "#00788c" },
            "CHI": { name: "Bulls", primary: "#ce1141", secondary: "#000000" },
            "CLE": { name: "Cavaliers", primary: "#860038", secondary: "#041e42" },
            "DAL": { name: "Mavericks", primary: "#00538c", secondary: "#002b5e" },
            "DEN": { name: "Nuggets", primary: "#0e2240", secondary: "#fec524" },
            "DET": { name: "Pistons", primary: "#c8102e", secondary: "#1d42ba" },
            "GSW": { name: "Warriors", primary: "#1d428a", secondary: "#ffc72c" },
            "HOU": { name: "Rockets", primary: "#ce1141", secondary: "#000000" },
            "IND": { name: "Pacers", primary: "#002d62", secondary: "#fdbb30" },
            "LAC": { name: "Clippers", primary: "#c8102e", secondary: "#1d428a" },
            "LAL": { name: "Lakers", primary: "#552583", secondary: "#fdb927" },
            "MEM": { name: "Grizzlies", primary: "#5d76a9", secondary: "#12173f" },
            "MIA": { name: "Heat", primary: "#98002e", secondary: "#f9a01b" },
            "MIL": { name: "Bucks", primary: "#00471b", secondary: "#eee1c6" },
            "MIN": { name: "Timberwolves", primary: "#0c2340", secondary: "#236192" },
            "NOP": { name: "Pelicans", primary: "#0c2340", secondary: "#c8102e" },
            "NYK": { name: "Knicks", primary: "#006bb6", secondary: "#f58426" },
            "OKC": { name: "Thunder", primary: "#007ac1", secondary: "#ef3b24" },
            "ORL": { name: "Magic", primary: "#0077c0", secondary: "#c4ced4" },
            "PHI": { name: "76ers", primary: "#006bb6", secondary: "#ed174c" },
            "PHX": { name: "Suns", primary: "#1d1160", secondary: "#e56020" },
            "POR": { name: "Trail Blazers", primary: "#e03a3e", secondary: "#000000" },
            "SAC": { name: "Kings", primary: "#5a2d81", secondary: "#63727a" },
            "SAS": { name: "Spurs", primary: "#c4ced4", secondary: "#000000" },
            "TOR": { name: "Raptors", primary: "#ce1141", secondary: "#000000" },
            "UTA": { name: "Jazz", primary: "#002b5c", secondary: "#00471b" },
            "WAS": { name: "Wizards", primary: "#002b5c", secondary: "#e31837" }
        };

        const POSITIONS = ["PG", "SG", "SF", "PF", "C"];
        
        const AWAY_COORDS = [
            { x: 50, y: 38 }, { x: 20, y: 25 }, { x: 80, y: 25 }, { x: 30, y: 8 }, { x: 70, y: 8 }
        ];

        const HOME_COORDS = [
            { x: 50, y: 62 }, { x: 20, y: 75 }, { x: 80, y: 75 }, { x: 30, y: 92 }, { x: 70, y: 92 }
        ];

        let allGames = [];
        let playerDatabase = {}; 

        // Lighting System
        let activeSpotlightTeam = 'none'; 
        let activeAwayIndex = -1;
        let activeHomeIndex = -1;
        
        let currentAwaySpotR = 0; let targetAwaySpotR = 0;
        let currentHomeSpotR = 0; let targetHomeSpotR = 0;
        
        let awaySpot = { x: 540, y: 480, targetX: 540, targetY: 480 }; 
        let homeSpot = { x: 540, y: 1440, targetX: 540, targetY: 1440 }; 
        
        let roamA1 = { x: 200, y: 200, targetX: 200, targetY: 200 };
        let roamA2 = { x: 800, y: 700, targetX: 800, targetY: 700 };
        let roamH1 = { x: 200, y: 1200, targetX: 200, targetY: 1200 };
        let roamH2 = { x: 800, y: 1700, targetX: 800, targetY: 1700 };
        let roamingInterval;

        let awayPrimaryHex = '#ffffff'; let awaySecondaryHex = '#ffffff';
        let homePrimaryHex = '#ffffff'; let homeSecondaryHex = '#ffffff';

        function hexToRgba(hex, alpha) {
            hex = hex.replace('#', '');
            let r = parseInt(hex.length === 3 ? hex.slice(0, 1).repeat(2) : hex.slice(0, 2), 16);
            let g = parseInt(hex.length === 3 ? hex.slice(1, 2).repeat(2) : hex.slice(2, 4), 16);
            let b = parseInt(hex.length === 3 ? hex.slice(2, 3).repeat(2) : hex.slice(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function drawHole(ctx, x, y, innerR, outerR) {
            if (outerR <= 1) return; 
            const grad = ctx.createRadialGradient(x, y, innerR, x, y, outerR);
            grad.addColorStop(0, 'rgba(0, 0, 0, 1)');       
            grad.addColorStop(0.3, 'rgba(0, 0, 0, 0.85)'); 
            grad.addColorStop(0.6, 'rgba(0, 0, 0, 0.4)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');       
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, outerR, 0, Math.PI * 2); ctx.fill();
        }

        function drawColoredTint(ctx, x, y, innerR, outerR, hex, intensityMultiplier) {
            if (outerR <= 1 || intensityMultiplier <= 0) return;
            const grad = ctx.createRadialGradient(x, y, innerR, x, y, outerR);
            grad.addColorStop(0, hexToRgba(hex, 0.65 * intensityMultiplier));       
            grad.addColorStop(0.3, hexToRgba(hex, 0.45 * intensityMultiplier)); 
            grad.addColorStop(0.6, hexToRgba(hex, 0.15 * intensityMultiplier));
            grad.addColorStop(1, hexToRgba(hex, 0));       
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, outerR, 0, Math.PI * 2); ctx.fill();
        }

        function drawMainHalo(ctx, x, y, innerR, outerR, color1, color2) {
            if (outerR <= 1) return;
            const grad = ctx.createRadialGradient(x, y, innerR, x, y, outerR);
            grad.addColorStop(0, 'rgba(0, 0, 0, 0)');      
            grad.addColorStop(0.15, hexToRgba(color1, 0.65)); 
            grad.addColorStop(0.6, hexToRgba(color2, 0.45)); 
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)'); 
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, outerR, 0, Math.PI * 2); ctx.fill();
        }

        function renderSpotlights() {
            const canvas = document.getElementById('spotlight-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const captureArea = document.getElementById('capture-area').getBoundingClientRect();
            
            if (activeSpotlightTeam === 'none') {
                targetAwaySpotR = 0; targetHomeSpotR = 0;
            } else if (activeSpotlightTeam === 'blackout') {
                targetAwaySpotR = 0; targetHomeSpotR = 0;
            } else if (activeSpotlightTeam === 'away_logo') {
                targetAwaySpotR = 450; targetHomeSpotR = 0;
                awaySpot.targetX = 540; awaySpot.targetY = 480;
            } else if (activeSpotlightTeam === 'both_logos') {
                targetAwaySpotR = 450; targetHomeSpotR = 450;
                awaySpot.targetX = 540; awaySpot.targetY = 480;
                homeSpot.targetX = 540; homeSpot.targetY = 1440;
            } else if (activeSpotlightTeam === 'away') {
                targetAwaySpotR = 450; targetHomeSpotR = 0;
                if (activeAwayIndex >= 0) {
                    const target = document.getElementById(`away-node-${activeAwayIndex}`);
                    if (target) {
                        const rect = target.querySelector('.player-cutout-wrapper').getBoundingClientRect();
                        awaySpot.targetX = (rect.left + rect.width / 2) - captureArea.left;
                        awaySpot.targetY = (rect.top + rect.height / 2) - captureArea.top;
                    }
                }
            } else if (activeSpotlightTeam === 'staredown') {
                targetAwaySpotR = 450; targetHomeSpotR = 450;
                if (activeAwayIndex >= 0) {
                    const targetA = document.getElementById(`away-node-${activeAwayIndex}`);
                    if (targetA) {
                        const rectA = targetA.querySelector('.player-cutout-wrapper').getBoundingClientRect();
                        awaySpot.targetX = (rectA.left + rectA.width / 2) - captureArea.left;
                        awaySpot.targetY = (rectA.top + rectA.height / 2) - captureArea.top;
                    }
                }
                if (activeHomeIndex >= 0) {
                    const targetH = document.getElementById(`home-node-${activeHomeIndex}`);
                    if (targetH) {
                        const rectH = targetH.querySelector('.player-cutout-wrapper').getBoundingClientRect();
                        homeSpot.targetX = (rectH.left + rectH.width / 2) - captureArea.left;
                        homeSpot.targetY = (rectH.top + rectH.height / 2) - captureArea.top;
                    }
                }
            } else if (activeSpotlightTeam === 'climax') {
                targetAwaySpotR = 2000; targetHomeSpotR = 2000;
            }
            
            const spotEase = 0.2;
            awaySpot.x += (awaySpot.targetX - awaySpot.x) * spotEase; awaySpot.y += (awaySpot.targetY - awaySpot.y) * spotEase;
            homeSpot.x += (homeSpot.targetX - homeSpot.x) * spotEase; homeSpot.y += (homeSpot.targetY - homeSpot.y) * spotEase;
            
            currentAwaySpotR += (targetAwaySpotR - currentAwaySpotR) * 0.15;
            currentHomeSpotR += (targetHomeSpotR - currentHomeSpotR) * 0.15;
            
            const roamSpeed = 0.08;
            roamA1.x += (roamA1.targetX - roamA1.x) * roamSpeed; roamA1.y += (roamA1.targetY - roamA1.y) * roamSpeed;
            roamA2.x += (roamA2.targetX - roamA2.x) * roamSpeed; roamA2.y += (roamA2.targetY - roamA2.y) * roamSpeed;
            roamH1.x += (roamH1.targetX - roamH1.x) * roamSpeed; roamH1.y += (roamH1.targetY - roamH1.y) * roamSpeed;
            roamH2.x += (roamH2.targetX - roamH2.x) * roamSpeed; roamH2.y += (roamH2.targetY - roamH2.y) * roamSpeed;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-over';
            
            ctx.fillStyle = `rgba(0, 0, 0, 1.0)`; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.globalCompositeOperation = 'destination-out';
            drawHole(ctx, awaySpot.x, awaySpot.y, currentAwaySpotR * 0.25, currentAwaySpotR);
            drawHole(ctx, homeSpot.x, homeSpot.y, currentHomeSpotR * 0.25, currentHomeSpotR);
            
            if (activeSpotlightTeam !== 'climax' && activeSpotlightTeam !== 'blackout') { 
                drawHole(ctx, roamA1.x, roamA1.y, 30, 210 * (currentAwaySpotR/450)); 
                drawHole(ctx, roamA2.x, roamA2.y, 30, 210 * (currentAwaySpotR/450)); 
                drawHole(ctx, roamH1.x, roamH1.y, 30, 210 * (currentHomeSpotR/450)); 
                drawHole(ctx, roamH2.x, roamH2.y, 30, 210 * (currentHomeSpotR/450)); 
            }
            
            ctx.globalCompositeOperation = 'source-over';
            if (activeSpotlightTeam !== 'climax' && activeSpotlightTeam !== 'blackout') { 
                drawColoredTint(ctx, roamA1.x, roamA1.y, 30, 210, awayPrimaryHex, currentAwaySpotR/450); 
                drawColoredTint(ctx, roamA2.x, roamA2.y, 30, 210, awaySecondaryHex, currentAwaySpotR/450); 
                drawColoredTint(ctx, roamH1.x, roamH1.y, 30, 210, homePrimaryHex, currentHomeSpotR/450); 
                drawColoredTint(ctx, roamH2.x, roamH2.y, 30, 210, homeSecondaryHex, currentHomeSpotR/450); 
            }
            drawMainHalo(ctx, awaySpot.x, awaySpot.y, currentAwaySpotR * 0.25, currentAwaySpotR, awayPrimaryHex, awaySecondaryHex);
            drawMainHalo(ctx, homeSpot.x, homeSpot.y, currentHomeSpotR * 0.25, currentHomeSpotR, homePrimaryHex, homeSecondaryHex);
            
            requestAnimationFrame(renderSpotlights);
        }

        function moveRoamingLights() {
            function getEvasiveTarget(minY, maxY, mainSpot) {
                let rx, ry; let attempts = 0; let isValid = false;
                while (!isValid && attempts < 15) {
                    rx = Math.floor(Math.random() * 880) + 100; 
                    ry = Math.floor(Math.random() * (maxY - minY)) + minY; 
                    const distToMain = Math.hypot(rx - mainSpot.x, ry - mainSpot.y);
                    if (distToMain > 300) isValid = true; 
                    attempts++;
                }
                return { x: rx, y: ry };
            }
            const nsA1 = getEvasiveTarget(100, 860, awaySpot); roamA1.targetX = nsA1.x; roamA1.targetY = nsA1.y;
            const nsA2 = getEvasiveTarget(100, 860, awaySpot); roamA2.targetX = nsA2.x; roamA2.targetY = nsA2.y;
            const nsH1 = getEvasiveTarget(1060, 1820, homeSpot); roamH1.targetX = nsH1.x; roamH1.targetY = nsH1.y;
            const nsH2 = getEvasiveTarget(1060, 1820, homeSpot); roamH2.targetX = nsH2.x; roamH2.targetY = nsH2.y;
        }

        function triggerQuake() {
            const captureArea = document.getElementById('capture-area');
            captureArea.classList.remove('quake-active'); 
            void captureArea.offsetWidth; 
            captureArea.classList.add('quake-active');
        }

        function getNbaLogo(abbr) { if (!abbr) return ''; return `logos/${abbr}.svg`; }

        function getPlayerData(playerName) {
            if (!playerName) return null;
            const nicknames = { "cam": "cameron", "cameron": "cam", "steph": "stephen", "stephen": "steph", "trey": "trae", "mo": "mohamed", "mohamed": "mo", "nico": "nicolas", "nicolas": "nico" };
            const normalize = (str) => { return str.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\./g, ""); };
            const cleanInput = normalize(playerName); const inputParts = cleanInput.split(" "); const firstName = inputParts[0]; const lastName = inputParts.slice(1).join(" ");
            
            for (const key in playerDatabase) {
                const dbName = normalize(playerDatabase[key].name || ""); const dbShort = normalize(playerDatabase[key].short_name || "");
                if (dbName === cleanInput || dbShort === cleanInput) return playerDatabase[key];
            }
            if (nicknames[firstName]) {
                const nicknameVariant = nicknames[firstName] + " " + lastName;
                for (const key in playerDatabase) {
                    const dbName = normalize(playerDatabase[key].name || ""); const dbShort = normalize(playerDatabase[key].short_name || "");
                    if (dbName === nicknameVariant || dbShort === nicknameVariant) return playerDatabase[key];
                }
            }
            if (lastName.length > 2) {
                for (const key in playerDatabase) {
                    const dbName = normalize(playerDatabase[key].name || "");
                    if (dbName.includes(lastName) && dbName.startsWith(firstName.charAt(0))) return playerDatabase[key];
                }
            }
            return null; 
        }

        function handleImageError(img) { const container = img.parentElement; container.innerHTML = '<div class="fallback-silhouette"></div>'; }

        async function loadData() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                let targetDate = urlParams.get('date');
                if (!targetDate) {
                    const estDate = new Date(new Date().toLocaleString("en-US", {timeZone: "America/New_York"}));
                    const yyyy = estDate.getFullYear(); const mm = String(estDate.getMonth() + 1).padStart(2, '0'); const dd = String(estDate.getDate()).padStart(2, '0');
                    targetDate = `${yyyy}-${mm}-${dd}`;
                }
                document.getElementById('date-indicator').value = targetDate;
                
                const timestamp = new Date().getTime();
                const [nbaRes, playersRes] = await Promise.all([ fetch(`https://nbastartingfive.com/data/${targetDate}.json?v=${timestamp}`), fetch(`data/players.json?v=${timestamp}`) ]);

                if (nbaRes.ok) {
                    const data = await nbaRes.json();
                    allGames = data.games.filter(g => {
                        if (g.date !== targetDate) return false;
                        if (!g.teams || !g.rosters) return false;
                        const t1 = g.teams[0]; const t2 = g.teams[1];
                        const hasRoster1 = g.rosters[t1] && g.rosters[t1].players && g.rosters[t1].players.length >= 5;
                        const hasRoster2 = g.rosters[t2] && g.rosters[t2].players && g.rosters[t2].players.length >= 5;
                        if (!hasRoster1 && !hasRoster2) return false; return true; 
                    });
                }
                if (playersRes.ok) playerDatabase = await playersRes.json();
            } catch (e) { console.error("Failed to load data.", e); }
            
            populateDropdown();
            
            const urlParams = new URLSearchParams(window.location.search);
            const botTeam = urlParams.get('team');
            if (botTeam !== null) { const foundIndex = allGames.findIndex(g => g.teams.includes(botTeam)); if (foundIndex !== -1) document.getElementById('game-selector').value = foundIndex; }

            if (allGames.length > 0) renderCard();
        }

        function populateDropdown() {
            const select = document.getElementById('game-selector'); select.innerHTML = '';
            allGames.forEach((g, idx) => {
                const opt = document.createElement('option'); opt.value = idx;
                const t1 = g.teams[0]; const t2 = g.teams[1];
                opt.textContent = `${t1} @ ${t2}`; select.appendChild(opt);
            });
            select.addEventListener('change', () => renderCard());
        }

        function buildPlayerNode(player, index, teamType, coords, delaySec) {
            const pos = POSITIONS[index];
            const dbPlayer = getPlayerData(player.name); const photoUrl = dbPlayer ? dbPlayer.photo : null;
            const jerseyNum = dbPlayer && dbPlayer.jersey ? dbPlayer.jersey : "";
            let displayName = player.name; if (displayName.length > 18) displayName = displayName.substring(0, 16) + '...';

            let spelledNameHtml = displayName.split('').map((char, idx) => {
                return `<span class="typewriter-char" style="animation-delay: ${idx * 0.05}s;">${char === ' ' ? '&nbsp;' : char}</span>`;
            }).join('');

            const photoHtml = (photoUrl && photoUrl.trim() !== '') ? `<img src="${photoUrl}" class="player-photo" crossorigin="anonymous" onerror="handleImageError(this)">` : `<div class="fallback-silhouette"></div>`;
            const animClass = teamType === 'away' ? `anim-jump-${index * 2}` : `anim-jump-${index * 2 + 1}`;
            
            return `
                <div id="${teamType}-node-${index}" class="player-node ${teamType}-node ${animClass}" style="--final-x: ${coords.x}%; --final-y: ${coords.y}%; --entrance-delay: ${delaySec}s;">
                    <div id="${teamType}-shock-${index}" class="shockwave-ring"></div>
                    <div id="${teamType}-wrap-${index}" class="player-cutout-wrapper">
                        ${photoHtml}
                        <div id="${teamType}-hud-${index}" class="player-hud">
                            <div class="hud-pos">${pos}</div>
                            ${jerseyNum ? `<div class="hud-num">${jerseyNum}</div>` : ''}
                            <div class="hud-name">${spelledNameHtml}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCard() {
            if(allGames.length === 0) return;
            
            const gameIdx = document.getElementById('game-selector').value; const game = allGames[gameIdx];
            const awayAbbr = game.teams[0]; const homeAbbr = game.teams[1];
            const awayData = NBA_TEAMS[awayAbbr]; const homeData = NBA_TEAMS[homeAbbr];

            if(awayData) {
                let pColor = awayData.primary === "#ffffff" ? awayData.secondary : awayData.primary;
                document.documentElement.style.setProperty('--away-primary', pColor);
                document.documentElement.style.setProperty('--away-secondary', awayData.secondary);
                awayPrimaryHex = pColor; awaySecondaryHex = awayData.secondary;
            }
            if(homeData) {
                let pColor = homeData.primary === "#ffffff" ? homeData.secondary : homeData.primary;
                document.documentElement.style.setProperty('--home-primary', pColor);
                document.documentElement.style.setProperty('--home-secondary', homeData.secondary);
                homePrimaryHex = pColor; homeSecondaryHex = homeData.secondary;
            }

            document.getElementById('away-logo').src = getNbaLogo(awayAbbr);
            document.getElementById('home-logo').src = getNbaLogo(homeAbbr);

            const awayStarters = game.rosters[awayAbbr].players.slice(0, 5);
            const homeStarters = game.rosters[homeAbbr].players.slice(0, 5);
            const container = document.getElementById('players-container'); 
            container.innerHTML = '';
            
            // INTRO TIMELINE LOGIC
            activeSpotlightTeam = 'none'; 
            currentAwaySpotR = 0; currentHomeSpotR = 0;
            requestAnimationFrame(renderSpotlights);
            
            if (roamingInterval) clearInterval(roamingInterval);
            roamingInterval = setInterval(moveRoamingLights, 600);
            moveRoamingLights();

            // 5.5s: Away Logo Highlight
            setTimeout(() => { activeSpotlightTeam = 'away_logo'; }, 5500);

            // 8.0s: Both Logos Highlight
            setTimeout(() => { activeSpotlightTeam = 'both_logos'; }, 8000);
            
            // 11.0s: Start Player Loop (Staredown and Blackout Logic)
            for(let i=0; i<5; i++) {
                let awayDelay = 11.0 + (i * 9.0);
                let homeDelay = awayDelay + 4.5;
                
                container.insertAdjacentHTML('beforeend', buildPlayerNode(awayStarters[i], i, 'away', AWAY_COORDS[i], awayDelay));
                container.insertAdjacentHTML('beforeend', buildPlayerNode(homeStarters[i], i, 'home', HOME_COORDS[i], homeDelay));

                // Away Jump Launch
                setTimeout(() => {
                    activeSpotlightTeam = 'away'; 
                    activeAwayIndex = i;
                }, awayDelay * 1000);

                // Away Landing
                setTimeout(() => {
                    document.getElementById(`away-wrap-${i}`).classList.add('player-highlight');
                    document.getElementById(`away-hud-${i}`).classList.add('hud-reveal');
                    triggerQuake();
                    const shock = document.getElementById(`away-shock-${i}`);
                    if(shock) { shock.classList.remove('anim-shockwave'); void shock.offsetWidth; shock.classList.add('anim-shockwave'); }
                }, (awayDelay + 1.2) * 1000);

                // Home Jump Launch (Staredown Begins)
                setTimeout(() => {
                    activeSpotlightTeam = 'staredown'; 
                    activeHomeIndex = i;
                }, homeDelay * 1000);

                // Home Landing
                setTimeout(() => {
                    document.getElementById(`home-wrap-${i}`).classList.add('player-highlight');
                    document.getElementById(`home-hud-${i}`).classList.add('hud-reveal');
                    triggerQuake();
                    const shock = document.getElementById(`home-shock-${i}`);
                    if(shock) { shock.classList.remove('anim-shockwave'); void shock.offsetWidth; shock.classList.add('anim-shockwave'); }
                }, (homeDelay + 1.2) * 1000);

                // 1-Second Blackout Reset
                setTimeout(() => {
                    activeSpotlightTeam = 'blackout';
                }, (homeDelay + 3.5) * 1000);
            }

            // Timeline Climax exactly at 56.0s
            setTimeout(() => {
                activeSpotlightTeam = 'climax';
                document.getElementById('fault-line').classList.add('shatter-line');
                document.getElementById('game7-text').classList.add('reveal-game7');
                document.getElementById('spotlight-canvas').style.opacity = '0';
                triggerQuake();
            }, 56000); 
        }

        function takeScreenshot() {
            const capture = document.getElementById('capture-area'); capture.style.opacity = '0.5';
            setTimeout(() => { capture.style.opacity = '1'; }, 100);
        }

        loadData();
    </script>
</body>
