<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Starting 5 - Cinco de Mayo Fiesta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&family=Oswald:wght@500;700&family=Montserrat:ital,wght@0,800;1,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --team-primary: #17408B; 
            --team-secondary: #C9082A;
            --bg-wood: #eacc98; 
            --text-dark: #111; 
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #050302; 
            font-family: 'Oswald', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #controls {
            margin-bottom: 20px;
            background: #222;
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            z-index: 100;
        }

        select, button, input {
            padding: 8px 16px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #333;
            color: white;
            cursor: pointer;
            font-family: 'Oswald', sans-serif;
        }

        button:hover { background: #555; }

        #capture-area {
            width: 1080px;
            height: 1080px; 
            background-color: var(--bg-wood);
            background-image: repeating-linear-gradient(
                to right,
                rgba(0, 0, 0, 0.05) 0px,
                rgba(0, 0, 0, 0.05) 50px,
                rgba(255, 255, 255, 0.05) 50px,
                rgba(255, 255, 255, 0.05) 100px
            );
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            color: var(--text-dark);
            border-top: 15px solid var(--team-primary);
            border-bottom: 15px solid var(--team-primary);
        }

        /* --- PAPEL PICADO BANNERS --- */
        .papel-picado {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60px;
            z-index: 11;
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg"><path d="M0,0 L120,0 L120,50 L105,30 L90,50 L75,30 L60,50 L45,30 L30,50 L15,30 L0,50 Z" fill="black"/></svg>');
            -webkit-mask-size: 120px 100%;
            mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg"><path d="M0,0 L120,0 L120,50 L105,30 L90,50 L75,30 L60,50 L45,30 L30,50 L15,30 L0,50 Z" fill="black"/></svg>');
            mask-size: 120px 100%;
            transform-origin: top center;
            animation: sway 4s infinite alternate ease-in-out;
        }
        .papel-1 { background-color: var(--team-primary); top: -5px; animation-delay: 0s; }
        .papel-2 { background-color: var(--team-secondary); top: 15px; left: 60px; animation-delay: -2s; }

        @keyframes sway {
            0% { transform: skewX(-4deg) rotate(-1deg); }
            100% { transform: skewX(4deg) rotate(1deg); }
        }

        /* --- THE QUAKE EFFECT --- */
        @keyframes arenaQuake {
            0% { transform: translate(0, 0) scale(1); }
            20% { transform: translate(-15px, 15px) scale(1.02); }
            40% { transform: translate(15px, -15px) scale(1.02); }
            60% { transform: translate(-15px, -5px) scale(1.02); }
            80% { transform: translate(15px, 5px) scale(1.02); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .quake-active { animation: arenaQuake 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97); }

        .arena-glow {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 350px;
            background: radial-gradient(ellipse at top, var(--team-primary) 0%, transparent 70%);
            opacity: 0.15; z-index: 1; pointer-events: none;
        }

        #header {
            width: 100%; box-sizing: border-box; padding: 30px 50px 10px; 
            display: flex; align-items: center; justify-content: space-between;
            position: relative; z-index: 10;
        }

        .header-left { display: flex; flex-direction: column; }

        .starting-tag {
            font-family: 'Teko', sans-serif; font-size: 40px; color: var(--text-dark);
            text-transform: uppercase; letter-spacing: 3px; line-height: 1;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5); transition: all 0.3s ease;
        }

        #team-name {
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-style: italic; font-size: 75px; 
            margin: 0; line-height: 0.9; text-transform: uppercase; letter-spacing: 1px;
            color: var(--team-primary); position: relative; z-index: 1;
        }

        #team-name::before {
            content: attr(data-text); position: absolute; left: 0; top: 0; z-index: -1;
            -webkit-text-stroke: 6px #fff; text-shadow: 4px 4px 0px var(--team-secondary);
        }

        #matchup-info {
            font-family: 'Oswald', sans-serif; font-size: 24px; color: #444; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }

        #team-logo { width: 140px; height: 140px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); }

        #court-scene {
            width: 100%; height: 850px; position: absolute; bottom: 0;
            display: flex; justify-content: center; align-items: flex-end;
        }

        #court {
            width: 960px; height: 800px; position: relative;
            border: 4px solid var(--team-primary); border-bottom: none; border-radius: 10px 10px 0 0;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
        }

        .paint-area {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 320px; height: 350px; border: 4px solid var(--team-primary); border-bottom: none;
            background: rgba(0, 0, 0, 0.05);
        }

        .free-throw-circle {
            position: absolute; bottom: 350px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 60px; border: 4px solid var(--team-primary); border-bottom: none; 
            border-radius: 60px 60px 0 0; background: transparent; z-index: 1;
        }

        .three-point-arc {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 800px; height: 550px; border: 4px solid var(--team-primary); border-radius: 50% 50% 0 0;
            border-bottom: none; clip-path: inset(0 0 80px 0); box-sizing: border-box; 
        }

        .corner-three-left { position: absolute; bottom: 0; left: 80px; width: 4px; height: 81px; background: var(--team-primary); }
        .corner-three-right { position: absolute; bottom: 0; right: 80px; width: 4px; height: 81px; background: var(--team-primary); }

        .half-court-circle {
            position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; border: 4px solid var(--team-primary); border-radius: 50%;
        }

        /* --- NEON TEAM WATERMARK --- */
        #fiesta-watermark {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2; pointer-events: none;
        }

        .fiesta-logo {
            width: 350px; height: 350px; object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(255, 120, 0, 0.7)) sepia(0.3) hue-rotate(-20deg) saturate(1.5);
            opacity: 0.4; position: relative; z-index: 2; 
        }

        /* Game 1 text firmly locked back at 45% (center court) */
        #game1-text {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 100; pointer-events: none;
        }

        .neon-game-text {
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-style: italic;
            font-size: 90px; white-space: nowrap; color: #fff; margin-top: -10px; letter-spacing: 5px;
            position: relative;
            text-shadow: 0 0 10px var(--team-primary), 0 0 20px var(--team-primary), 0 0 40px var(--team-primary), 6px 6px 0px var(--team-secondary), -6px -6px 0px #fff;
        }

        /* CANVAS LIGHTING ENGINE */
        #spotlight-canvas { position: absolute; top: 0; left: 0; width: 1080px; height: 1080px; z-index: 20; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }
        .lights-out-mode #spotlight-canvas { opacity: 1; }

        /* ======================================================== */

        .player-node { position: absolute; display: flex; flex-direction: column; align-items: center; }

        /* --- HYPED BENCH STYLING & WEAPONS --- */
        .bench-node { z-index: 5; transform: translate(-50%, -50%); }
        .bench-node .player-position, .bench-node .player-number { display: none; }

        @keyframes benchJump { 0%, 100% { transform: translate(-50%, 0%) scale(0.75); } 50% { transform: translate(-50%, -15%) scale(0.75); } }

        .maraca { position: absolute; font-size: 55px; z-index: 15; bottom: -15px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); }
        .maraca-left { left: -35px; animation: shakeMaracaLeft 0.15s infinite alternate ease-in-out; }
        .maraca-right { right: -35px; animation: shakeMaracaRight 0.15s infinite alternate ease-in-out; }

        @keyframes shakeMaracaLeft { 0% { transform: rotate(-25deg) translateY(0); } 100% { transform: rotate(15deg) translateY(-5px); } }
        @keyframes shakeMaracaRight { 0% { transform: scaleX(-1) rotate(-25deg) translateY(0); } 100% { transform: scaleX(-1) rotate(15deg) translateY(-5px); } }

        /* The Piñata Stick (Hit Squad Only) */
        .pinata-stick {
            position: absolute; bottom: 20px; left: -30px; width: 14px; height: 120px;
            background: repeating-linear-gradient(45deg, var(--team-primary), var(--team-primary) 10px, var(--team-secondary) 10px, var(--team-secondary) 20px);
            border-radius: 6px; transform-origin: bottom center; transform: rotate(-30deg);
            z-index: 26; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); border: 2px solid #fff;
        }

        @keyframes swingStick { 0% { transform: rotate(-30deg); } 40% { transform: rotate(-100deg); } 100% { transform: rotate(70deg); } }
        .anim-swing { animation: swingStick 0.25s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }

        /* --- STARTER BASE --- */
        .starter-node { opacity: 0; z-index: 10; }
        .cinematic-wrapper { display: flex; flex-direction: column; align-items: center; }
        .photo-wrapper { position: relative; width: 190px; height: 190px; }

        /* --- THE DONKEY PIÑATA ON A STRING --- */
        .pinata-wrapper {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; display: flex; flex-direction: column; align-items: center;
            transform-origin: 50% -400px; /* Swing from the ceiling! */
            animation: pinataSway 2.5s infinite alternate ease-in-out;
        }
        
        .pinata-string {
            position: absolute; bottom: 85%; width: 3px; height: 600px;
            background: linear-gradient(to top, rgba(255,255,255,0.9), rgba(255,255,255,0));
        }

        .pinata-emoji {
            font-size: 160px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6)); line-height: 1;
        }
        
        @keyframes pinataSway { 0% { transform: translate(-50%, -50%) rotate(-6deg); } 100% { transform: translate(-50%, -50%) rotate(6deg); } }
        
        .shatter { animation: pinataShatter 0.4s cubic-bezier(0.1, 0.8, 0.3, 1) forwards !important; }
        @keyframes pinataShatter { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2.5) rotate(45deg); opacity: 0; visibility: hidden; } }

        /* --- CSS CONFETTI ENGINE --- */
        .confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; }
        .confetti-piece { position: absolute; width: 12px; height: 12px; opacity: 0; animation: popConfetti 1.5s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
        @keyframes popConfetti { 0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; } 80% { opacity: 1; } 100% { transform: translate(var(--vx), var(--vy)) rotate(720deg) scale(0.5); opacity: 0; } }

        /* --- SHOCKWAVE RING FOR THE LANDING --- */
        .shockwave-ring {
            position: absolute; top: 50%; left: 50%; width: 200px; height: 200px; border-radius: 50%;
            border: 12px solid var(--team-primary); transform: translate(-50%, -50%) scale(0.5); opacity: 0; z-index: 11; pointer-events: none;
        }
        @keyframes ringExplode { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; border-color: var(--team-primary); } 100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; border-width: 2px; border-color: var(--team-secondary); } }
        .anim-shockwave { animation: ringExplode 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }

        .player-photo-container {
            width: 190px; height: 190px; border-radius: 50%; border: 6px solid #fff; background-color: #222; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 12; overflow: hidden; position: absolute; top: 0; left: 0; box-sizing: border-box;
        }

        .player-photo { display: block; width: 100%; height: 100%; object-fit: cover; object-position: center top; transform: scale(1.15) translateY(5px); }
        .fallback-silhouette { width: 100%; height: 100%; background-color: #2b2b2b; background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" fill="%23666666" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'); background-size: 90%; background-position: center 20px; background-repeat: no-repeat; }

        .player-position {
            position: absolute; top: -8px; left: -8px; background-color: var(--team-primary); color: #fff;
            border: 4px solid var(--team-secondary); width: 58px; height: 58px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-family: 'Teko', sans-serif; font-size: 28px; font-weight: bold; z-index: 16; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .player-number {
            position: absolute; top: -8px; right: -8px; background-color: var(--team-secondary); color: #fff;
            border: 4px solid var(--team-primary); width: 58px; height: 58px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-family: 'Teko', sans-serif; font-size: 30px; font-weight: bold; z-index: 16; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .nameplate-wrapper {
            display: flex; align-items: stretch; margin-top: 10px; z-index: 14; position: relative; 
            box-shadow: 0 5px 10px rgba(0,0,0,0.3); border-radius: 8px; overflow: hidden; border: 2px solid var(--team-secondary);
        }

        .player-nameplate { background: #fff; color: var(--text-dark); padding: 8px 24px; font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }

        /* ========================================================
           HEADER ENTRANCE ANIMATIONS
           ======================================================== */
        .anim-header-tag { animation: headerSlideDown 1s ease-out 0.5s forwards; opacity: 0; }
        .anim-team-name { animation: teamNameZoom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2.5s forwards; opacity: 0; }
        .anim-logo { animation: logoSpinIn 0.8s ease-out 2.5s forwards; opacity: 0; }

        @keyframes headerSlideDown { 0% { opacity: 0; transform: translateY(-40px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes teamNameZoom { 0% { opacity: 0; transform: scale(1.8) rotate(-3deg); filter: blur(8px); } 100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0); } }
        @keyframes logoSpinIn { 0% { opacity: 0; transform: translateX(100px) rotate(90deg) scale(0.2); } 100% { opacity: 1; transform: translateX(0) rotate(0) scale(1); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); } }

        /* ========================================================
           THE FIESTA SALSA EXIT (BENCH)
           ======================================================== */
        @keyframes fiestaExitLeft { 0% { transform: translate(-50%, -15%) rotate(0deg) scale(0.75); opacity: 1; } 100% { transform: translate(-250%, -50%) rotate(-720deg) scale(0.5); opacity: 0; } }
        @keyframes fiestaExitRight { 0% { transform: translate(-50%, -15%) rotate(0deg) scale(0.75); opacity: 1; } 100% { transform: translate(150%, -50%) rotate(720deg) scale(0.5); opacity: 0; } }

        /* ========================================================
           NEW ENTRANCE: THE PIÑATA CEILING DROP!
           ======================================================== */
        /* FIXED: Added translate(-50%, ...) so the nodes center themselves on their court coordinates! */
        @keyframes pinataDrop {
            0% { transform: translate(-50%, -1200px); opacity: 0; animation-timing-function: ease-in; }
            5% { transform: translate(-50%, -1200px); opacity: 1; }
            60% { transform: translate(-50%, calc(-50% + 40px)); opacity: 1; animation-timing-function: ease-out; }
            80% { transform: translate(-50%, calc(-50% - 15px)); opacity: 1; animation-timing-function: ease-in-out; }
            100% { transform: translate(-50%, -50%); opacity: 1; }
        }

    </style>
</head>
<body>

    <div id="controls">
        <label>Date:</label>
        <input type="text" id="date-indicator" readonly style="width: 100px; text-align: center; background: #444; border: 1px solid #555; color: #ccc;">
        
        <label>Game:</label>
        <select id="game-selector"></select>
        
        <label>Team:</label>
        <select id="team-selector">
            <option value="home">Home Team</option>
            <option value="away">Away Team</option>
        </select>
        
        <button onclick="takeScreenshot()">Simulate Screenshot</button>
    </div>

    <div id="capture-area">
        <div class="arena-glow"></div>
        <div class="papel-picado papel-1"></div>
        <div class="papel-picado papel-2"></div>
        
        <div id="header">
            <div class="header-left">
                <div id="starting-tag" class="starting-tag anim-header-tag">Starting 5</div>
                <h1 id="team-name" class="anim-team-name" data-text="LOADING...">LOADING...</h1>
                <div id="matchup-info">FETCHING DATA...</div>
            </div>
            <img id="team-logo" class="anim-logo" src="" alt="Team Logo">
        </div>

        <div id="court-scene">
            <div id="court">
                <div class="half-court-circle"></div>
                <div class="three-point-arc"></div>
                <div class="corner-three-left"></div>
                <div class="corner-three-right"></div>
                <div class="free-throw-circle"></div>
                <div class="paint-area"></div>
                
                <div id="fiesta-watermark">
                    <img id="crawl-logo" class="fiesta-logo" src="" alt="">
                </div>
                
                <div id="game1-text" class="neon-game-text">GAME 1</div>

                <div id="players-container"></div>
            </div>
        </div>

        <canvas id="spotlight-canvas" width="1080" height="1080"></canvas>
    </div>

    <script>
        const NBA_TEAMS = {
            "ATL": { name: "Hawks", primary: "#e03a3e", secondary: "#c1d32f", id: 1610612737 },
            "BOS": { name: "Celtics", primary: "#007A33", secondary: "#ba9653", id: 1610612738 },
            "BKN": { name: "Nets", primary: "#000000", secondary: "#ffffff", id: 1610612751 }, 
            "CHA": { name: "Hornets", primary: "#1d1160", secondary: "#00788c", id: 1610612766 },
            "CHI": { name: "Bulls", primary: "#ce1141", secondary: "#000000", id: 1610612741 },
            "CLE": { name: "Cavaliers", primary: "#860038", secondary: "#041e42", id: 1610612739 },
            "DAL": { name: "Mavericks", primary: "#00538c", secondary: "#002b5e", id: 1610612742 },
            "DEN": { name: "Nuggets", primary: "#0e2240", secondary: "#fec524", id: 1610612743 },
            "DET": { name: "Pistons", primary: "#c8102e", secondary: "#1d42ba", id: 1610612765 },
            "GSW": { name: "Warriors", primary: "#1d428a", secondary: "#ffc72c", id: 1610612744 },
            "HOU": { name: "Rockets", primary: "#ce1141", secondary: "#000000", id: 1610612745 },
            "IND": { name: "Pacers", primary: "#002d62", secondary: "#fdbb30", id: 1610612754 },
            "LAC": { name: "Clippers", primary: "#c8102e", secondary: "#1d428a", id: 1610612746 },
            "LAL": { name: "Lakers", primary: "#552583", secondary: "#fdb927", id: 1610612747 },
            "MEM": { name: "Grizzlies", primary: "#5d76a9", secondary: "#12173f", id: 1610612763 },
            "MIA": { name: "Heat", primary: "#98002e", secondary: "#f9a01b", id: 1610612748 },
            "MIL": { name: "Bucks", primary: "#00471b", secondary: "#eee1c6", id: 1610612749 },
            "MIN": { name: "Timberwolves", primary: "#0c2340", secondary: "#236192", id: 1610612750 },
            "NOP": { name: "Pelicans", primary: "#0c2340", secondary: "#c8102e", id: 1610612740 },
            "NYK": { name: "Knicks", primary: "#006bb6", secondary: "#f58426", id: 1610612752 },
            "OKC": { name: "Thunder", primary: "#007ac1", secondary: "#ef3b24", id: 1610612760 },
            "ORL": { name: "Magic", primary: "#0077c0", secondary: "#c4ced4", id: 1610612753 },
            "PHI": { name: "76ers", primary: "#006bb6", secondary: "#ed174c", id: 1610612755 },
            "PHX": { name: "Suns", primary: "#1d1160", secondary: "#e56020", id: 1610612756 },
            "POR": { name: "Trail Blazers", primary: "#e03a3e", secondary: "#000000", id: 1610612757 },
            "SAC": { name: "Kings", primary: "#5a2d81", secondary: "#63727a", id: 1610612758 },
            "SAS": { name: "Spurs", primary: "#c4ced4", secondary: "#000000", id: 1610612759 },
            "TOR": { name: "Raptors", primary: "#ce1141", secondary: "#000000", id: 1610612761 },
            "UTA": { name: "Jazz", primary: "#002b5c", secondary: "#00471b", id: 1610612762 },
            "WAS": { name: "Wizards", primary: "#002b5c", secondary: "#e31837", id: 1610612764 }
        };

        const POSITIONS = ["PG", "SG", "SF", "PF", "C"];
        
        const COURT_COORDS = [
            { x: 50, y: 17 }, 
            { x: 19, y: 44 }, 
            { x: 81, y: 44 }, 
            { x: 33, y: 77 }, 
            { x: 67, y: 77 }  
        ];

        let allGames = [];
        let playerDatabase = {}; 

        let activePlayerIndex = -1;
        let trackingSpotlight = false;
        let spotlightWiden = false; 
        let roamingInterval;
        
        let currentSpotX = 540;
        let currentSpotY = 540;
        let currentInnerR = 90;
        let currentOuterR = 360;
        
        let roamSpot1 = { x: 200, y: 200, targetX: 200, targetY: 200 };
        let roamSpot2 = { x: 800, y: 800, targetX: 800, targetY: 800 };
        
        let activePrimaryHex = '#ffffff';
        let activeSecondaryHex = '#ffffff';

        function hexToRgba(hex, alpha) {
            hex = hex.replace('#', '');
            let r = parseInt(hex.length === 3 ? hex.slice(0, 1).repeat(2) : hex.slice(0, 2), 16);
            let g = parseInt(hex.length === 3 ? hex.slice(1, 2).repeat(2) : hex.slice(2, 4), 16);
            let b = parseInt(hex.length === 3 ? hex.slice(2, 3).repeat(2) : hex.slice(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function drawHole(ctx, x, y, innerR, outerR) {
            const grad = ctx.createRadialGradient(x, y, innerR, x, y, outerR);
            grad.addColorStop(0, 'rgba(0, 0, 0, 1)');       
            grad.addColorStop(0.3, 'rgba(0, 0, 0, 0.85)'); 
            grad.addColorStop(0.6, 'rgba(0, 0, 0, 0.4)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');       
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(x, y, outerR, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawColoredTint(ctx, x, y, innerR, outerR, hex) {
            const grad = ctx.createRadialGradient(x, y, innerR, x, y, outerR);
            grad.addColorStop(0, hexToRgba(hex, 0.65));       
            grad.addColorStop(0.3, hexToRgba(hex, 0.45)); 
            grad.addColorStop(0.6, hexToRgba(hex, 0.15));
            grad.addColorStop(1, hexToRgba(hex, 0));       
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(x, y, outerR, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawMainHalo(ctx, x, y, innerR, outerR, color1, color2) {
            const grad = ctx.createRadialGradient(x, y, innerR, x, y, outerR);
            grad.addColorStop(0, 'rgba(0, 0, 0, 0)');     
            grad.addColorStop(0.15, hexToRgba(color1, 0.65)); 
            grad.addColorStop(0.6, hexToRgba(color2, 0.45)); 
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)'); 
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(x, y, outerR, 0, Math.PI * 2);
            ctx.fill();
        }

        function renderSpotlights() {
            if (!trackingSpotlight) return;
            
            const canvas = document.getElementById('spotlight-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            const starters = document.querySelectorAll('.starter-node');
            let targetX = 540; 
            let targetY = 540; 
            
            if (activePlayerIndex >= 0 && activePlayerIndex < starters.length) {
                const target = starters[activePlayerIndex];
                const captureArea = document.getElementById('capture-area').getBoundingClientRect();
                
                const photoWrap = target.querySelector('.photo-wrapper');
                const targetRect = photoWrap.getBoundingClientRect();
                
                targetX = (targetRect.left + targetRect.width / 2) - captureArea.left;
                targetY = (targetRect.top + targetRect.height / 2) - captureArea.top;
            }
            
            currentSpotX += (targetX - currentSpotX) * 0.1;
            currentSpotY += (targetY - currentSpotY) * 0.1;
            
            const targetInnerR = spotlightWiden ? 550 : 90;
            const targetOuterR = spotlightWiden ? 1200 : 360;
            currentInnerR += (targetInnerR - currentInnerR) * 0.05;
            currentOuterR += (targetOuterR - currentOuterR) * 0.05;
            
            roamSpot1.x += (roamSpot1.targetX - roamSpot1.x) * 0.06;
            roamSpot1.y += (roamSpot1.targetY - roamSpot1.y) * 0.06;
            
            roamSpot2.x += (roamSpot2.targetX - roamSpot2.x) * 0.06;
            roamSpot2.y += (roamSpot2.targetY - roamSpot2.y) * 0.06;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(30, 10, 0, 0.85)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.globalCompositeOperation = 'destination-out';
            drawHole(ctx, currentSpotX, currentSpotY, currentInnerR, currentOuterR);
            if (!spotlightWiden) {
                drawHole(ctx, roamSpot1.x, roamSpot1.y, 30, 210);
                drawHole(ctx, roamSpot2.x, roamSpot2.y, 30, 210);
            }
            
            ctx.globalCompositeOperation = 'source-over';
            if (!spotlightWiden) {
                drawColoredTint(ctx, roamSpot1.x, roamSpot1.y, 30, 210, '#ff007a'); 
                drawColoredTint(ctx, roamSpot2.x, roamSpot2.y, 30, 210, '#00e5ff'); 
            }
            
            drawMainHalo(ctx, currentSpotX, currentSpotY, currentInnerR, currentOuterR, activePrimaryHex, activeSecondaryHex);
            
            requestAnimationFrame(renderSpotlights);
        }

        function moveRoamingLights() {
            function getEvasiveTarget() {
                let rx, ry;
                let attempts = 0;
                let isValid = false;
                
                while (!isValid && attempts < 15) {
                    rx = Math.floor(Math.random() * 880) + 100;
                    ry = Math.floor(Math.random() * 880) + 100;
                    
                    const distToMain = Math.hypot(rx - currentSpotX, ry - currentSpotY);
                    if (distToMain > 400) isValid = true;
                    attempts++;
                }
                return { x: rx, y: ry };
            }

            const newSpot1 = getEvasiveTarget();
            roamSpot1.targetX = newSpot1.x;
            roamSpot1.targetY = newSpot1.y;
            
            const newSpot2 = getEvasiveTarget();
            roamSpot2.targetX = newSpot2.x;
            roamSpot2.targetY = newSpot2.y;
        }

        function getNbaLogo(abbr) {
            if (!abbr) return '';
            return `logos/${abbr}.svg`; 
        }

        function getPlayerData(playerName) {
            if (!playerName) return null;
        
            const nicknames = {
                "cam": "cameron", "cameron": "cam", "steph": "stephen", "stephen": "steph",
                "trey": "trae", "mo": "mohamed", "mohamed": "mo", "nico": "nicolas", "nicolas": "nico"
            };
        
            const normalize = (str) => {
                return str.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\./g, ""); 
            };
        
            const cleanInput = normalize(playerName);
            const inputParts = cleanInput.split(" ");
            const firstName = inputParts[0];
            const lastName = inputParts.slice(1).join(" ");
        
            for (const key in playerDatabase) {
                const dbName = normalize(playerDatabase[key].name || "");
                const dbShort = normalize(playerDatabase[key].short_name || "");
                if (dbName === cleanInput || dbShort === cleanInput) return playerDatabase[key];
            }
            
            if (nicknames[firstName]) {
                const nicknameVariant = nicknames[firstName] + " " + lastName;
                for (const key in playerDatabase) {
                    const dbName = normalize(playerDatabase[key].name || "");
                    const dbShort = normalize(playerDatabase[key].short_name || "");
                    if (dbName === nicknameVariant || dbShort === nicknameVariant) return playerDatabase[key];
                }
            }
            
            if (lastName.length > 2) {
                for (const key in playerDatabase) {
                    const dbName = normalize(playerDatabase[key].name || "");
                    if (dbName.includes(lastName) && dbName.startsWith(firstName.charAt(0))) {
                        return playerDatabase[key];
                    }
                }
            }
            
            return null; 
        }

        function handleImageError(img) {
            const container = img.parentElement;
            container.innerHTML = '<div class="fallback-silhouette"></div>';
        }

        async function loadData() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                let targetDate = urlParams.get('date');
                
                if (!targetDate) {
                    const estDate = new Date(new Date().toLocaleString("en-US", {timeZone: "America/New_York"}));
                    const yyyy = estDate.getFullYear();
                    const mm = String(estDate.getMonth() + 1).padStart(2, '0');
                    const dd = String(estDate.getDate()).padStart(2, '0');
                    targetDate = `${yyyy}-${mm}-${dd}`;
                }
                
                document.getElementById('date-indicator').value = targetDate;
                
                const timestamp = new Date().getTime();
                const [nbaRes, playersRes] = await Promise.all([
                    fetch(`https://nbastartingfive.com/data/${targetDate}.json?v=${timestamp}`),
                    fetch(`data/players.json?v=${timestamp}`) 
                ]);

                if (nbaRes.ok) {
                    const data = await nbaRes.json();
                    allGames = data.games.filter(g => {
                        if (g.date !== targetDate) return false;
                        if (!g.teams || !g.rosters) return false;
                        const t1 = g.teams[0];
                        const t2 = g.teams[1];
                        const hasRoster1 = g.rosters[t1] && g.rosters[t1].players && g.rosters[t1].players.length >= 5;
                        const hasRoster2 = g.rosters[t2] && g.rosters[t2].players && g.rosters[t2].players.length >= 5;
                        
                        if (!hasRoster1 && !hasRoster2) return false;
                        return true; 
                    });
                }
                
                if (playersRes.ok) {
                    playerDatabase = await playersRes.json();
                }
            } catch (e) {
                console.error("Failed to load data.", e);
            }
            
            populateDropdown();
            
            const urlParams = new URLSearchParams(window.location.search);
            const botTeam = urlParams.get('team');
            const botSide = urlParams.get('side');

            if (botTeam !== null) {
                const foundIndex = allGames.findIndex(g => g.teams.includes(botTeam));
                if (foundIndex !== -1) document.getElementById('game-selector').value = foundIndex;
            }
            
            if (botSide !== null) document.getElementById('team-selector').value = botSide;

            if (allGames.length > 0) renderCard();
            else {
                const teamNameEl = document.getElementById('team-name');
                teamNameEl.textContent = "NO LINEUPS YET";
                teamNameEl.setAttribute('data-text', "NO LINEUPS YET");
                document.getElementById('matchup-info').textContent = "Check back closer to tipoff.";
            }
        }

        function populateDropdown() {
            const select = document.getElementById('game-selector');
            select.innerHTML = '';
            
            allGames.forEach((g, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                const t1 = g.teams[0];
                const t2 = g.teams[1];
                const t1Verified = g.rosters[t1].is_official === true || (g.rosters[t1].players && g.rosters[t1].players.slice(0,5).every(p => p.verified === true));
                const t2Verified = g.rosters[t2].is_official === true || (g.rosters[t2].players && g.rosters[t2].players.slice(0,5).every(p => p.verified === true));
                opt.textContent = `${t1Verified ? t1 + ' (Confirmed)' : t1} @ ${t2Verified ? t2 + ' (Confirmed)' : t2}`;
                select.appendChild(opt);
            });
            
            select.addEventListener('change', () => renderCard());
            document.getElementById('team-selector').addEventListener('change', () => renderCard());
        }

        function applyTeamTheme(abbr) {
            const theme = NBA_TEAMS[abbr];
            if (theme) {
                let primaryColor = theme.primary === "#ffffff" ? theme.secondary : theme.primary;
                document.documentElement.style.setProperty('--team-primary', primaryColor);
                document.documentElement.style.setProperty('--team-secondary', theme.secondary);
                
                activePrimaryHex = primaryColor;
                activeSecondaryHex = theme.secondary;
            }
        }

        function renderCard() {
            if(allGames.length === 0) return;

            trackingSpotlight = false;
            spotlightWiden = false;
            activePlayerIndex = -1;
            if (roamingInterval) clearInterval(roamingInterval);
            const captureArea = document.getElementById('capture-area');
            if (captureArea) captureArea.classList.remove('lights-out-mode');
            currentInnerR = 90;
            currentOuterR = 360;

            const gameIdx = document.getElementById('game-selector').value;
            const side = document.getElementById('team-selector').value;
            const game = allGames[gameIdx];

            const awayAbbr = game.teams[0];
            const homeAbbr = game.teams[1];
            
            const targetAbbr = side === 'home' ? homeAbbr : awayAbbr;
            const oppAbbr = side === 'home' ? awayAbbr : homeAbbr;
            const isHome = side === 'home';

            const targetData = NBA_TEAMS[targetAbbr];
            const oppData = NBA_TEAMS[oppAbbr];

            applyTeamTheme(targetAbbr);

            const teamNameStr = targetData ? targetData.name : targetAbbr;
            const teamNameEl = document.getElementById('team-name');
            teamNameEl.textContent = teamNameStr;
            teamNameEl.setAttribute('data-text', teamNameStr);

            teamNameEl.classList.remove('anim-team-name');
            void teamNameEl.offsetWidth; 
            teamNameEl.classList.add('anim-team-name');

            document.getElementById('matchup-info').textContent = `${isHome ? 'VS' : '@'} ${oppData ? oppData.name : oppAbbr}  |  ${game.date}`;
            
            const logoUrl = getNbaLogo(targetAbbr);
            const logoEl = document.getElementById('team-logo');
            logoEl.src = logoUrl;
            
            logoEl.classList.remove('anim-logo');
            void logoEl.offsetWidth; 
            logoEl.classList.add('anim-logo');
            
            document.getElementById('crawl-logo').src = logoUrl;

            const container = document.getElementById('players-container');
            container.innerHTML = '';

            const starters = game.rosters[targetAbbr].players.slice(0, 5);
            const bench = (game.rosters[targetAbbr].bench || []).slice(0, 7);

            // 1. RENDER THE HIT SQUAD AND THE MARACA CHEERLEADERS
            bench.forEach((player, index) => {
                const dbPlayer = getPlayerData(player.name);
                const photoUrl = dbPlayer ? dbPlayer.photo : null;
                const lastName = player.name.split(' ').pop().substring(0, 10); 

                const photoHtml = (photoUrl && photoUrl.trim() !== '') 
                    ? `<img src="${photoUrl}" class="player-photo" crossorigin="anonymous" onerror="handleImageError(this)">` 
                    : `<div class="fallback-silhouette"></div>`;

                const benchSpacing = bench.length > 1 ? 60 / (bench.length - 1) : 0;
                const benchX = 20 + (index * benchSpacing); 
                
                const jumpSpeed = (0.6 + Math.random() * 0.4).toFixed(2);
                const jumpOffset = (Math.random() * -1).toFixed(2);
                
                let weaponHtml = '';
                if (index < 5) {
                    weaponHtml = `<div id="stick-${index}" class="pinata-stick"></div>`;
                } else {
                    weaponHtml = `
                        <div class="maraca maraca-left">🪇</div>
                        <div class="maraca maraca-right">🪇</div>
                    `;
                }

                const html = `
                    <div id="bench-node-${index}" class="player-node bench-node" 
                         data-orig-x="${benchX}" data-jump-speed="${jumpSpeed}" data-jump-offset="${jumpOffset}"
                         style="left: ${benchX}%; top: -15%; animation: benchJump ${jumpSpeed}s infinite ease-in-out; animation-delay: ${jumpOffset}s;">
                        <div class="cinematic-wrapper">
                            <div class="photo-wrapper">
                                ${weaponHtml}
                                <div class="player-photo-container">
                                    ${photoHtml}
                                </div>
                            </div>
                            <div class="nameplate-wrapper">
                                <div class="player-nameplate">${lastName}</div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });

            // 2. RENDER THE STARTERS VIA PIÑATA DROP
            const tagEl = document.getElementById('starting-tag');
            tagEl.textContent = "STARTING 5";
            tagEl.style.color = "var(--text-dark)";
            tagEl.style.textShadow = "1px 1px 0px rgba(255,255,255,0.5)";

            tagEl.classList.remove('anim-header-tag');
            void tagEl.offsetWidth; 
            tagEl.classList.add('anim-header-tag');

            starters.forEach((player, index) => {
                const pos = POSITIONS[index];
                const coords = COURT_COORDS[index];
                
                const dbPlayer = getPlayerData(player.name);
                const photoUrl = dbPlayer ? dbPlayer.photo : null;
                const jerseyNum = dbPlayer && dbPlayer.jersey ? dbPlayer.jersey : "";

                let displayName = player.name;
                if (displayName.length > 18) displayName = displayName.substring(0, 16) + '...';

                const photoHtml = (photoUrl && photoUrl.trim() !== '') 
                    ? `<img src="${photoUrl}" class="player-photo" crossorigin="anonymous" onerror="handleImageError(this)">` 
                    : `<div class="fallback-silhouette"></div>`;

                const delays = [10.93, 18.15, 26.17, 33.72, 40.87]; 
                const baseDelay = delays[index]; 
                
                const tJumpStart = baseDelay - 1.4;
                const tLand = baseDelay - 0.65;
                const tSwing = baseDelay - 0.25;
                const tShatter = baseDelay;
                const tRetreat = baseDelay + 0.8;
                const tResume = baseDelay + 1.2;

                // FIXED: Placed pinataDrop animation properly on the starter-node so it is visible!
                const html = `
                    <div class="player-node starter-node" style="left: ${coords.x}%; top: ${coords.y}%; animation: pinataDrop 0.75s forwards; animation-delay: ${tJumpStart}s;">
                        <div class="cinematic-wrapper">
                            <div class="photo-wrapper">
                                <div id="shockwave-${index}" class="shockwave-ring"></div>
                                
                                <div id="player-assets-${index}" style="opacity: 0; transform: scale(0.5); transition: all 0.4s cubic-bezier(0.1, 0.8, 0.3, 1); width: 100%; height: 100%; position: absolute; top: 0; left: 0;">
                                    <div class="player-position">${pos}</div>
                                    ${jerseyNum ? `<div class="player-number">${jerseyNum}</div>` : ''}
                                    <div class="player-photo-container">
                                        ${photoHtml}
                                    </div>
                                </div>

                                <div id="pinata-${index}" class="pinata-wrapper" style="animation-delay: -${Math.random() * 2}s;">
                                    <div class="pinata-string"></div>
                                    <div class="pinata-emoji">🪅</div>
                                </div>
                                
                                <div id="confetti-${index}" class="confetti-container"></div>
                            </div>
                            <div class="nameplate-wrapper">
                                <div class="player-nameplate">${displayName}</div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);

                // --- 🚨 THE PIÑATA CHOREOGRAPHY TIMING 🚨 ---
                setTimeout(() => { activePlayerIndex = index; }, tJumpStart * 1000); 
                
                let hitterIndex = index;
                if (hitterIndex >= bench.length) {
                    hitterIndex = bench.length - 1; 
                }
                const hitSquadNode = document.getElementById(`bench-node-${hitterIndex}`);
                const stick = document.getElementById(`stick-${hitterIndex}`);

                // Piñata Drops from Ceiling and Lands!
                setTimeout(() => {
                    const captureArea = document.getElementById('capture-area');
                    captureArea.classList.remove('quake-active');
                    void captureArea.offsetWidth;
                    captureArea.classList.add('quake-active');

                    const shockwave = document.getElementById(`shockwave-${index}`);
                    if (shockwave) shockwave.classList.add('anim-shockwave');

                    // Release the Hit Squad!
                    if (hitSquadNode && stick) {
                        hitSquadNode.style.animation = 'none'; 
                        hitSquadNode.style.transition = 'left 0.4s linear, top 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
                        hitSquadNode.style.transform = 'translate(-50%, -50%) scale(0.85)';
                        hitSquadNode.style.zIndex = '25'; 
                        hitSquadNode.style.left = (coords.x + 12) + '%'; 
                        hitSquadNode.style.top = (coords.y - 2) + '%';
                    }
                }, tLand * 1000); 

                // Hit Squad Swings!
                setTimeout(() => {
                    if (stick) stick.classList.add('anim-swing');
                }, tSwing * 1000);

                // CRACK! Piñata breaks exactly at baseDelay!
                setTimeout(() => {
                    // Shatter the Donkey
                    const pinata = document.getElementById(`pinata-${index}`);
                    if (pinata) pinata.classList.add('shatter');

                    // REVEAL THE PLAYER PHOTO
                    const assets = document.getElementById(`player-assets-${index}`);
                    if(assets) {
                        assets.style.opacity = '1';
                        assets.style.transform = 'scale(1)';
                    }

                    // Second Quake
                    const captureArea = document.getElementById('capture-area');
                    captureArea.classList.remove('quake-active');
                    void captureArea.offsetWidth;
                    captureArea.classList.add('quake-active');

                    // Fire Confetti using Team Colors!
                    const confCont = document.getElementById(`confetti-${index}`);
                    if (confCont) {
                        const colors = [activePrimaryHex, activeSecondaryHex, '#ffffff', '#eacc98'];
                        for(let i=0; i<25; i++) {
                            let conf = document.createElement('div');
                            conf.className = 'confetti-piece';
                            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                            conf.style.left = '89px'; 
                            conf.style.top = '89px';
                            const angle = Math.random() * Math.PI * 2;
                            const velocity = 80 + Math.random() * 120;
                            conf.style.setProperty('--vx', `${Math.cos(angle) * velocity}px`);
                            conf.style.setProperty('--vy', `${Math.sin(angle) * velocity - 100}px`);
                            confCont.appendChild(conf);
                        }
                    }
                }, tShatter * 1000);

                // Hit Squad retreats!
                setTimeout(() => {
                    if (hitSquadNode) {
                        hitSquadNode.style.transition = 'left 0.4s ease-out, top 0.4s ease-out';
                        hitSquadNode.style.left = hitSquadNode.dataset.origX + '%';
                        hitSquadNode.style.top = '-15%';
                        if (stick) stick.classList.remove('anim-swing');
                    }
                }, tRetreat * 1000);

                // Hit Squad resumes cheering!
                setTimeout(() => {
                    if (hitSquadNode) {
                        hitSquadNode.style.transition = 'none';
                        hitSquadNode.style.transform = ''; 
                        hitSquadNode.style.zIndex = '5';
                        hitSquadNode.style.animation = `benchJump ${hitSquadNode.dataset.jumpSpeed}s infinite ease-in-out`;
                        hitSquadNode.style.animationDelay = `${hitSquadNode.dataset.jumpOffset}s`;
                    }
                }, tResume * 1000);
            });

            // --- TRIGGER THE ARENA LIGHTS OFF AT 4.11s ---
            setTimeout(() => {
                if (captureArea) {
                    captureArea.classList.add('lights-out-mode');
                }
                trackingSpotlight = true;
                
                currentSpotX = 540; currentSpotY = 540;
                moveRoamingLights();
                
                roamSpot1.x = roamSpot1.targetX; roamSpot1.y = roamSpot1.targetY;
                roamSpot2.x = roamSpot2.targetX; roamSpot2.y = roamSpot2.targetY;

                renderSpotlights(); 
                
                roamingInterval = setInterval(moveRoamingLights, 1500);
            }, 4110); 

            // --- THE FINAL ARENA FLOODLIGHT (40.5s) ---
            setTimeout(() => {
                spotlightWiden = true;
                activePlayerIndex = -1; 
            }, 43500);

            // --- THE SALSA SPIN EXIT (BENCH) AT 44.2s ---
            setTimeout(() => {
                const benchNodes = document.querySelectorAll('.bench-node');
                
                Array.from(benchNodes).forEach((node, idx) => {
                    node.style.animation = 'none'; 
                    node.style.transform = 'translate(-50%, -15%) scale(0.75)'; 
                    void node.offsetWidth; 
                    
                    const pushDir = idx % 2 === 0 ? 'fiestaExitLeft' : 'fiestaExitRight';
                    node.style.animation = `${pushDir} 3s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
                });
            }, 44200); 

            // --- THE ARENA LIGHTS ON AT 44.5s ---
            setTimeout(() => {
                if (captureArea) captureArea.classList.remove('lights-out-mode');
                trackingSpotlight = false; 
                if (roamingInterval) clearInterval(roamingInterval); 
            }, 44500); 
        }

        function takeScreenshot() {
            const capture = document.getElementById('capture-area');
            capture.style.opacity = '0.5';
            setTimeout(() => { capture.style.opacity = '1'; }, 100);
            alert("Ready! Playwright will capture #capture-area as a 1080x1080 square.");
        }

        loadData();
    </script>
</body>
